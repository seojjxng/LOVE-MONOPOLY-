<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(6, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #ff80bf; transform: scale(1.05); }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log, #chat-log { height: 150px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        #dado-valor { font-size: 24px; font-weight: bold; margin: 10px 0; }
        #banco-container { grid-column: 1 / 6; grid-row: 6 / 7; display: flex; align-items: center; justify-content: center; background: #ffccd5; border-radius: 15px; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <div id="dado-valor">0</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
        <div id="banco-container" style="padding: 10px; gap: 10px;">
            <button class="btn" onclick="abrirBanco()">🏦 Solicitar Préstamo</button>
            <button class="btn" onclick="verSaldos()">👥 Ver Saldos</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn" onclick="unirse()">Entrar a Juego</button>
        </div>
        <div class="panel">
            <strong>Historial</strong><div id="log"></div>
            <strong>Chat</strong><div id="chat-log"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn" onclick="enviarChat()">Enviar</button>
        </div>
    </div>
</div>

<div id="modal">
    <h3 id="modal-title" style="margin:0"></h3>
    <p id="modal-text" style="color:#c71585; font-weight:bold"></p>
    <div id="modal-extra"></div>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1, sala = "";
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const colores = ["#f590b0", "#dcd0ff", "#c1e1c1", "#f5eb98"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];
    const eventos = [{txt:"¡Ganaste la lotería!", m:300, g:true}, {txt:"¡Heredaste una fortuna!", m:600, g:true}, {txt:"Debes impuestos", m:150, g:false}, {txt:"¡Inversión fallida!", m:250, g:false}];

    function log(txt) { db.ref('salas/' + sala + '/log').push(txt); }

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/' + sala + '/jugadores').once('value', snap => {
            miIdx = snap.numChildren();
            if(miIdx > 3) return;
            db.ref('salas/' + sala + '/jugadores/' + miIdx).set({ pos: 0, dinero: 1000, turnosCarcel: 0 });
            if(miIdx == 0) db.ref('salas/' + sala + '/turno').set(0);
            sincronizar();
        });
    }

    function tirarDado() {
        if(miIdx === -1) return;
        
        // Bloqueo temporal para evitar clics dobles
        document.querySelector('img[onclick="tirarDado()"]').style.pointerEvents = 'none';

        db.ref('salas/' + sala).transaction(s => {
            if (!s || s.turno !== miIdx) return s;
            
            let j = s.jugadores[miIdx];
            
            if(j.turnosCarcel > 0) {
                j.turnosCarcel--;
                s.turno = (s.turno + 1) % s.jugadores.length;
                return s;
            }

            let val = Math.floor(Math.random() * 6) + 1;
            let nuevaPos = (j.pos + val) % mapa.length;
            
            // Lógica de cobro al pasar por salida
            if(nuevaPos < j.pos) {
                j.dinero = (j.dinero || 0) + 100;
            }
            
            j.pos = nuevaPos;
            s.turno = (s.turno + 1) % s.jugadores.length;
            
            return s;
        }).then((result) => {
            if (result.committed) {
                // Actualizamos visuales tras confirmar en BD
                document.getElementById('dado-valor').innerText = "Listo"; 
                document.querySelector('img[onclick="tirarDado()"]').style.pointerEvents = 'auto';
            }
        });
    }

    function verificarCasilla(pos) {
        let div = document.getElementById('acciones'); div.innerHTML = "";
        let m = mapa[pos];

        if(pos === 4) { // ARRESTO
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: 11, turnosCarcel: 2 });
            showModal("¡AL ARRESTO!", "Has sido enviado a la cárcel por 2 turnos.");
            return;
        }

        if(pos === 12) { // IMPUESTOS
            db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) - 200);
            showModal("IMPUESTOS", "Pagaste $200 por servicios.");
            return;
        }

        if(m.n == "?" || m.n == "ARCA") {
            let ev = eventos[Math.floor(Math.random()*eventos.length)];
            db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) + (ev.g ? ev.m : -ev.m));
            showModal(m.n, ev.txt + " ($" + ev.m + ")");
            return;
        }

        db.ref('salas/' + sala + '/propiedades/' + pos).once('value', s => {
            let prop = s.val();
            if(!prop && m.p > 0) {
                div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar $${m.p}</button>`;
            } else if(prop && prop.owner != miIdx) {
                let renta = Math.floor(m.p * 0.2);
                db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - renta);
                db.ref('salas/' + sala + '/jugadores/' + prop.owner + '/dinero').transaction(d => d + renta);
                log(nombres[miIdx] + " pagó renta de $" + renta);
            }
        });
    }

    // ... (El resto de las funciones: abrirBanco, verSaldos, showModal, comprar, sincronizar, enviarChat se mantienen igual)
    function abrirBanco() {
        document.getElementById('modal-title').innerText = "Banco";
        let div = document.getElementById('modal-extra'); div.innerHTML = "";
        [200, 450, 600, 700].forEach(m => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = "Pedir $" + m;
            b.onclick = () => {
                db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d + m);
                document.getElementById('modal').style.display = 'none';
                log(nombres[miIdx] + " obtuvo un préstamo de $" + m);
            };
            div.appendChild(b);
        });
        document.getElementById('modal').style.display = 'block';
    }
    
    function verSaldos() {
        db.ref('salas/'+sala+'/jugadores').once('value', s => {
            let txt = ""; s.val().forEach((j, i) => txt += `${nombres[i]}: $${j.dinero}<br>`);
            document.getElementById('modal-title').innerText = "Saldos";
            document.getElementById('modal-text').innerHTML = txt;
            document.getElementById('modal-extra').innerHTML = "";
            document.getElementById('modal').style.display = 'block';
        });
    }

    function showModal(t, txt) { 
        document.getElementById('modal-title').innerText = t; 
        document.getElementById('modal-text').innerText = txt;
        document.getElementById('modal-extra').innerHTML = "";
        document.getElementById('modal').style.display = 'block'; 
    }

    function comprar(pos) { 
        db.ref('salas/' + sala + '/propiedades/' + pos).set({ owner: miIdx }); 
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - mapa[pos].p); 
        log(nombres[miIdx] + " compró " + mapa[pos].n); 
        document.getElementById('acciones').innerHTML = ""; 
    }

    function sincronizar() {
        db.ref('salas/' + sala).on('value', snap => {
            let s = snap.val();
            if(!s) return;
            document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
            document.getElementById('turno-text').innerText = "Turno: " + nombres[s.turno];
            
            s.jugadores.forEach((j, i) => {
                let el = document.getElementById('p' + i);
                el.style.display = 'block';
                let cell = document.getElementById('cell-' + j.pos);
                if(cell) {
                    el.style.left = (cell.offsetLeft + 10) + 'px';
                    el.style.top = (cell.offsetTop + 10) + 'px';
                }
            });
            
            if(s.propiedades) Object.keys(s.propiedades).forEach(p => { 
                let cell = document.getElementById('cell-'+p); 
                if(cell) cell.style.backgroundColor = colores[s.propiedades[p].owner]; 
            });
            
            if(s.log) {
                let html = Object.values(s.log).slice(-10).map(l => `<div>${l}</div>`).join('');
                document.getElementById('log').innerHTML = html;
            }
        });
    }

    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`; document.getElementById('board').appendChild(d); });
    function enviarChat() { let msg = document.getElementById('chat-msg').value; db.ref('salas/' + sala + '/chat').push({ n: nombres[miIdx], m: msg }); document.getElementById('chat-msg').value = ""; }
</script>

</body>
</html>
