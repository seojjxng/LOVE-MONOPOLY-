<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly 6x6</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 20px; }
        .board { display: grid; grid-template-columns: repeat(6, 80px); grid-template-rows: repeat(6, 80px); gap: 5px; background: #ffccd5; padding: 10px; border-radius: 20px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 7px; font-weight: bold; text-align: center; }
        .token { width: 25px; height: 25px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 6; grid-row: 2 / 6; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; margin: 10px; }
        #dice-result { font-size: 24px; font-weight: bold; color: #ff59aa; }
        .sidebar { width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: #fff0f9; padding: 15px; border-radius: 15px; border: 2px solid #ffccd5; }
        #log { height: 200px; overflow-y: auto; font-size: 11px; background: white; padding: 10px; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        
        <div class="center-zone">
            <div id="dice-result">--</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <div id="turno-text">Jugador: Esperando...</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>Historial</strong>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBV8Kcd8mF2CGlIRWDxDR6B3f1_50V3FH0",
        databaseURL: "https://monopolovely-default-rtdb.firebaseio.com",
        projectId: "monopolovely",
        storageBucket: "monopolovely.firebasestorage.app",
        messagingSenderId: "325639499908",
        appId: "1:325639499908:web:94ad73a6d82da77ce552d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1;
    db.ref('jugadores').once('value').then(snap => {
        const total = snap.numChildren();
        if (total < 4) {
            miIdx = total;
            db.ref('jugadores/' + miIdx).set({ activo: true });
            document.getElementById('p' + miIdx).style.display = 'block';
            document.getElementById('turno-text').innerText = "Eres Jugador " + (miIdx + 1);
        } else {
            alert("Sala llena");
        }
    });

    const board = document.getElementById('board');
    for(let i=0; i<36; i++) {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `P-${i}`;
        board.appendChild(d);
    }

    db.ref('game').on('value', snap => {
        const data = snap.val();
        if(!data) return;
        
        data.pos.forEach((p, i) => {
            const el = document.getElementById('p'+i);
            const cell = document.getElementById('cell-'+p);
            if(cell && el) { el.style.left = (cell.offsetLeft + 5) + 'px'; el.style.top = (cell.offsetTop + 5) + 'px'; }
        });

        if(data.lastRoll) document.getElementById('dice-result').innerText = data.lastRoll;
    });

    db.ref('chat').on('child_added', snap => {
        const msg = snap.val();
        document.getElementById('log').innerHTML += `<div>${msg.text}</div>`;
    });

    function tirarDado() {
        if(miIdx === -1) return;
        const val = Math.floor(Math.random()*6)+1;
        
        db.ref('game').once('value').then(snap => {
            let data = snap.val() || {pos: [0,0,0,0]};
            let p = data.pos;
            p[miIdx] = (p[miIdx] + val) % 36;
            
            db.ref('game').update({ pos: p, lastRoll: val });
            db.ref('chat').push({text: `J${miIdx+1} sacó un ${val}`});
        });
    }
</script>
</body>
</html>
