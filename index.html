<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; position: relative; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .token { width: 30px; height: 30px; position: absolute; transition: all 0.5s ease; z-index: 10; pointer-events: none; border-radius: 5px; }
        #modal { display: none; position: fixed; top: 30%; left: 40%; width: 300px; background: #fff0f9; border: 3px solid #ff80bf; padding: 20px; border-radius: 5px; text-align: center; z-index: 100; box-shadow: 10px 10px 0 #ff80bf; }
        .btn { padding: 10px 20px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="modal">
    <h3 id="modal-title" style="color: #c71585;">¡SUERTE!</h3>
    <p id="modal-desc"></p>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Aceptar</button>
</div>

<img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
<img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">

<div class="container">
    <div class="board" id="board"></div>
    <div class="center-zone">
        <div id="turno-text">ESPERANDO...</div>
        <div class="dice" onclick="tirarDado()" style="font-size: 40px; cursor: pointer;">🎲</div>
        <div style="margin-top:10px;">Tú: $<span id="dinero-mio">1000</span></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, amigoPos = 0, miDinero = 1000, bloqueado = false;
    const mapa = Array.from({length: 18}, (_, i) => ({n: i === 0 ? "SALIDA" : (i === 2 ? "SUERTE" : (i === 4 || i === 13 ? "POLICÍA" : "CASILLA " + i))}));

    function moverFichas() {
        [ {id: 'p1', pos: miPos, off: 0}, {id: 'p2', pos: amigoPos, off: 35} ].forEach(p => {
            const cell = document.getElementById('cell-' + p.pos);
            const rect = cell.getBoundingClientRect();
            const el = document.getElementById(p.id);
            // Evita superposición sumando offset si están en la misma casilla
            const isOverlap = (miPos === amigoPos);
            el.style.left = (rect.left + 5 + (isOverlap ? p.off : 0)) + 'px';
            el.style.top = (rect.top + 5) + 'px';
        });
    }

    function activarSuerte() {
        const obs = [{t:"Lotería", m:"¡Ganaste la lotería!", v:300}, {t:"Herencia", m:"Herencia recibida.", v:500}, {t:"Calle", m:"Dinero encontrado.", v:50}];
        const res = obs[Math.floor(Math.random()*obs.length)];
        miDinero += res.v;
        document.getElementById('modal-title').innerText = res.t;
        document.getElementById('modal-desc').innerText = res.m + " +$" + res.v;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('dinero-mio').innerText = miDinero;
    }

    function tirarDado() {
        if(!miTurno || bloqueado) return;
        let val = Math.floor(Math.random()*6)+1;
        let nuevaPos = (miPos + val);
        if (nuevaPos >= 18) { miDinero += 100; document.getElementById('dinero-mio').innerText = miDinero; }
        miPos = nuevaPos % 18;
        
        if (mapa[miPos].n === "POLICÍA") bloqueado = true;
        if (mapa[miPos].n === "SUERTE") activarSuerte();
        
        conn.send({type: 'MOVE', pos: miPos, lock: bloqueado});
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
        moverFichas();
    }

    peer.on('connection', c => { conn = c; miTurno = true; document.getElementById('turno-text').innerText = "¡ES TU TURNO!"; });
    
    // Configuración de grid
    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerText = m.n;
        board.appendChild(d);
    });

    // Listener de datos
    peer.on('open', id => console.log(id));
</script>
</body>
</html>
