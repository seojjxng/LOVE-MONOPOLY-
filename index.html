<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(6, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 3px 0; font-size: 11px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log { height: 100px; overflow-y: auto; font-size: 10px; background: white; padding: 5px; border-radius: 10px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; z-index: 999; }
        #banco-container { grid-column: 1 / 6; grid-row: 6 / 7; display: flex; flex-direction: column; align-items: center; background: #ffccd5; border-radius: 15px; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text">ESPERANDO...</div>
            <div id="dado-valor">0</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:50px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
        <div id="banco-container">
            <button class="btn" onclick="abrirBanco()">🏦 Solicitar Préstamo</button>
            <div id="ranking" style="font-size:10px; margin-top:5px; text-align:center;"></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre sala">
            <button class="btn" onclick="unirse()">Entrar</button>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<div id="modal">
    <h3 id="modal-title">Banco</h3>
    <div id="modal-extra"></div>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let miIdx = -1, sala = "";
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"ARRESTO",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:150},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/'+sala+'/jugadores').once('value', s => {
            miIdx = s.numChildren();
            db.ref('salas/'+sala+'/jugadores/'+miIdx).set({pos:0, dinero:1000, deuda:0, turnosCarcel:0});
            sincronizar();
        });
    }

    function tirarDado() {
        db.ref('salas/'+sala).once('value', s => {
            let j = s.val().jugadores[miIdx];
            if(j.turnosCarcel > 0) { db.ref('salas/'+sala+'/jugadores/'+miIdx+'/turnosCarcel').transaction(t => t-1); return; }
            let val = Math.floor(Math.random()*6)+1;
            let nPos = (j.pos + val) % 16;
            if(nPos < j.pos) {
                let pagoDeuda = Math.min(j.deuda, 50);
                db.ref('salas/'+sala+'/jugadores/'+miIdx).update({dinero: j.dinero + 100 - pagoDeuda, deuda: j.deuda - pagoDeuda});
            }
            db.ref('salas/'+sala+'/jugadores/'+miIdx).update({pos: nPos});
            verificarCasilla(nPos);
            db.ref('salas/'+sala+'/turno').set((s.val().turno + 1) % s.val().jugadores.length);
        });
    }

    function verificarCasilla(pos) {
        let m = mapa[pos];
        if(m.p > 0 && pos !== 12) {
            db.ref('salas/'+sala+'/propiedades/'+pos).once('value', s => {
                if(!s.val()) document.getElementById('acciones').innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar $${m.p}</button>`;
                else if(s.val().owner != miIdx) {
                    let renta = Math.floor(m.p * 0.2);
                    let retencion = Math.floor(renta * 0.5);
                    db.ref('salas/'+sala+'/jugadores/'+miIdx).update({dinero: db.ref('salas/'+sala+'/jugadores/'+miIdx).dinero - renta, deuda: db.ref('salas/'+sala+'/jugadores/'+miIdx).deuda + retencion});
                    db.ref('salas/'+sala+'/jugadores/'+s.val().owner+'/dinero').transaction(d => d + (renta - retencion));
                }
            });
        }
    }

    function comprar(pos) {
        db.ref('salas/'+sala+'/propiedades/'+pos).set({owner: miIdx});
        db.ref('salas/'+sala+'/jugadores/'+miIdx+'/dinero').transaction(d => d - mapa[pos].p);
        document.getElementById('acciones').innerHTML = "";
    }

    function abrirBanco() {
        document.getElementById('modal-extra').innerHTML = [200, 450, 600, 700].map(m => `<button class="btn" onclick="pedir(${m})">Pedir $${m}</button>`).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function pedir(m) {
        db.ref('salas/'+sala+'/jugadores/'+miIdx).update({dinero: db.ref('salas/'+sala+'/jugadores/'+miIdx).dinero + m, deuda: db.ref('salas/'+sala+'/jugadores/'+miIdx).deuda + m});
        document.getElementById('modal').style.display = 'none';
    }

    function sincronizar() {
        db.ref('salas/'+sala).on('value', snap => {
            let s = snap.val();
            document.getElementById('ranking').innerHTML = s.jugadores.map((j, i) => `J${i}: $${j.dinero}`).join(' | ');
            s.jugadores.forEach((j, i) => {
                let el = document.getElementById('p'+i); el.style.display = 'block';
                let cell = document.getElementById('cell-'+j.pos);
                el.style.left = (cell.offsetLeft+10)+'px'; el.style.top = (cell.offsetTop+10)+'px';
            });
            if(s.propiedades) Object.keys(s.propiedades).forEach(p => document.getElementById('cell-'+p).style.backgroundColor = ["#f590b0", "#dcd0ff", "#c1e1c1", "#f5eb98"][s.propiedades[p].owner]);
        });
    }

    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-'+i; d.innerHTML = `${m.n}<br>${m.p||''}`; document.getElementById('board').appendChild(d); });
</script>
</body>
</html>
