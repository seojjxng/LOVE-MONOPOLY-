<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; transition: 0.3s; }
        .owned-host { background-color: #add8e6 !important; }
        .owned-visitante { background-color: #ffb6c1 !important; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; margin: 10px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <button class="btn" onclick="mejorar()" style="background:#ff80bf;">MEJORAR (+)</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <input type="text" id="peer-id" class="input-field" placeholder="ID amigo">
            <button class="btn" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 11px; margin-top: 5px;">Iniciando...</div>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, juegoIniciado = false, esHost = false;
    let miDinero = 1000;
    
    const mapa = [
        {n: "SALIDA", p:0, up:0}, {n: "TÉ", p:100, owner:null, up:0}, {n: "SUERTE", p:0, up:0}, {n: "BOUTIQUE", p:200, owner:null, up:0}, 
        {n: "¡A LA CÁRCEL!", p:0, up:0}, {n: "CAFÉ", p:150, owner:null, up:0}, {n: "PARQUE", p:120, owner:null, up:0}, {n: "SPA", p:250, owner:null, up:0}, 
        {n: "VILLA 1", p:300, owner:null, up:0}, {n: "MALL", p:350, owner:null, up:0}, {n: "JOYAS", p:400, owner:null, up:0}, {n: "POLICÍA", p:0, up:0}, 
        {n: "VILLA 3", p:220, owner:null, up:0}, {n: "SUERTE", p:0, up:0}, {n: "COMUNIDAD", p:0, up:0}, {n: "VIVIENDA", p:500, owner:null, up:0}
    ];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    function moverFichas() {
        const el = document.getElementById(esHost ? 'p1' : 'p2');
        const cell = document.getElementById('cell-' + miPos);
        if(cell && el) {
            el.style.left = (cell.offsetLeft + (esHost ? 31 : 29)) + 'px';
            el.style.top = (cell.offsetTop + 30) + 'px';
        }
    }

    function tirarDado() {
        if(!juegoIniciado || !miTurno) return;
        let val = Math.floor(Math.random()*6)+1;
        let nuevaPos = miPos + val;
        if (nuevaPos >= mapa.length) { miDinero += 100; log("Pasaste por SALIDA: +$100"); }
        miPos = nuevaPos % mapa.length;
        let actual = mapa[miPos];
        if (actual.n === "SUERTE" || actual.n === "COMUNIDAD") {
            let azar = Math.floor(Math.random() * 200) - 100;
            miDinero += azar;
            log("Casilla " + actual.n + ": " + (azar >= 0 ? "+" : "") + azar + "$");
        } else if (actual.owner && actual.owner !== (esHost ? 'host' : 'visitante')) {
            let mult = actual.up === 0 ? 0.1 : (actual.up === 1 ? 0.15 : 0.25);
            let alquiler = Math.floor(actual.p * mult);
            miDinero -= alquiler;
            log("Pagaste $" + alquiler + " de renta");
            if(conn) conn.send({type: 'PAY', amount: alquiler});
        }
        document.getElementById('dinero-mio').innerText = miDinero;
        moverFichas();
        if(conn) conn.send({type: 'MOVE', pos: miPos});
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
    }

    function comprar() {
        let actual = mapa[miPos];
        if(!actual.owner && actual.p > 0 && miDinero >= actual.p) {
            miDinero -= actual.p;
            actual.owner = esHost ? 'host' : 'visitante';
            document.getElementById('cell-' + miPos).classList.add(esHost ? 'owned-host' : 'owned-visitante');
            document.getElementById('dinero-mio').innerText = miDinero;
            log("Compraste " + actual.n);
        }
    }

    function mejorar() {
        let actual = mapa[miPos];
        if(actual.owner === (esHost ? 'host' : 'visitante') && actual.up < 2) {
            let costo = actual.p * 0.5;
            if(miDinero >= costo) { miDinero -= costo; actual.up++; document.getElementById('dinero-mio').innerText = miDinero; log("Mejorado a nivel " + actual.up); }
        }
    }

    function conectar() { esHost = true; conn = peer.connect(document.getElementById('peer-id').value); setupConn(); }

    function setupConn() {
        conn.on('open', () => { juegoIniciado = true; miTurno = esHost; log("Conectado."); });
        conn.on('data', d => {
            if(d.type === 'MOVE') {
                const otraFicha = document.getElementById(esHost ? 'p2' : 'p1');
                const cell = document.getElementById('cell-' + d.pos);
                if(cell && otraFicha) {
                    otraFicha.style.left = (cell.offsetLeft + (esHost ? 29 : 31)) + 'px';
                    otraFicha.style.top = (cell.offsetTop + 30) + 'px';
                }
                miTurno = true; document.getElementById('turno-text').innerText = "¡TU TURNO!";
            }
            if(d.type === 'PAY') { miDinero += d.amount; document.getElementById('dinero-mio').innerText = miDinero; }
        });
    }

    peer.on('open', id => document.getElementById('my-id').innerText = "ID: " + id);
    peer.on('connection', c => { conn = c; setupConn(); juegoIniciado = true; });

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
