<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { display: flex; gap: 25px; width: 950px; }
        
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #ff59aa; text-align: center; transition: 0.3s; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 12px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        #log { height: 180px; overflow-y: auto; font-size: 12px; color: #555; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="margin-bottom: 10px;">ESPERANDO...</div>
            <div onclick="tirarDado()" style="font-size: 50px; cursor: pointer;">🎲</div>
            <button class="btn" onclick="comprar()">COMPRAR PROPIEDAD</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>ID de Conexión</strong>
            <input type="text" id="peer-id" placeholder="ID amigo" style="width:100%; margin: 10px 0; padding: 8px;">
            <button class="btn" onclick="conectar()">Conectar con Amigo</button>
            <div id="my-id" style="font-size: 10px;">Generando ID...</div>
        </div>
        <div class="panel">
            <strong>Bancos</strong>
            <div>💖 Tú: $<span id="dinero-mio">1000</span></div>
            <div>💎 Amigo: $<span id="dinero-amigo">1000</span></div>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, miDinero = 1000, amigoDinero = 1000;
    const mapa = [
        {n: "SALIDA", p:0, owner:null}, {n: "TÉ", p:100, owner:null}, {n: "SUERTE", p:0, owner:null}, 
        {n: "BOUTIQUE", p:200, owner:null}, {n: "HOME", p:0, owner:null}, {n: "CAFÉ", p:150, owner:null},
        {n: "PARQUE", p:120, owner:null}, {n: "POLICÍA", p:0, owner:null}, {n: "SPA", p:250, owner:null},
        {n: "VILLA 1", p:300, owner:null}, {n: "MALL", p:350, owner:null}, {n: "JOYAS", p:400, owner:null},
        {n: "VILLA 2", p:200, owner:null}, {n: "AEROPUERTO", p:0, owner:null}, {n: "VILLA 3", p:220, owner:null},
        {n: "GYM", p:180, owner:null}, {n: "VILLA 4", p:250, owner:null}, {n: "SUERTE", p:0, owner:null}
    ];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    peer.on('open', id => document.getElementById('my-id').innerText = "Tu ID: " + id);
    peer.on('connection', c => { conn = c; setup(c); });

    function conectar() {
        conn = peer.connect(document.getElementById('peer-id').value);
        setup(conn);
        miTurno = true;
        document.getElementById('turno-text').innerText = "TU TURNO";
    }

    function setup(c) {
        c.on('data', d => {
            if(d.type === 'MOVE') {
                miPos = d.pos;
                log("Amigo cayó en " + mapa[miPos].n);
                if(mapa[miPos].owner === 'AMIGO') pagarRenta();
                miTurno = true;
                document.getElementById('turno-text').innerText = "TU TURNO";
            }
        });
    }

    function tirarDado() {
        if(!miTurno) return log("No es tu turno.");
        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % mapa.length;
        
        log("Caíste en " + mapa[miPos].n);
        if(mapa[miPos].owner === 'AMIGO') pagarRenta();
        
        conn.send({type: 'MOVE', pos: miPos});
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
    }

    function comprar() {
        let prop = mapa[miPos];
        if(prop.p > 0 && prop.owner === null && miDinero >= prop.p) {
            miDinero -= prop.p;
            prop.owner = 'YO';
            document.getElementById('dinero-mio').innerText = miDinero;
            document.getElementById('cell-'+miPos).style.background = "#ff80bf";
            log("Compraste " + prop.n);
        } else log("No puedes comprar esto.");
    }

    function pagarRenta() {
        let renta = Math.floor(mapa[miPos].p * 0.3);
        miDinero -= renta;
        log("¡Pagaste $" + renta + " de renta!");
        document.getElementById('dinero-mio').innerText = miDinero;
    }

    // Inicializar tablero
    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-'+i;
        d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
