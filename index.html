<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .game-column { display: flex; flex-direction: column; gap: 15px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; position: relative; cursor: pointer; }
        .strip { width: 100%; height: 15px; background: #ff80bf; position: absolute; top: 0; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .house-container { position: absolute; bottom: 5px; display: flex; gap: 2px; }
        .house { width: 10px; height: 10px; background: #ff59aa; }
        .hotel { width: 30px; height: 10px; background: #c71585; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log { height: 125px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
        #chat-log { height: 125px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; }
        .card-property { border: 2px solid #c71585; padding: 10px; border-radius: 5px; background: white; margin-bottom: 10px; }
        .card-header { background: #ff80bf; color: white; padding: 5px; font-weight: bold; margin-bottom: 10px; }
        #banco-container { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; background: #fff0f9; border: 2px solid #ffccd5; border-radius: 20px; padding: 15px; gap: 10px; }
        #cell-0 { grid-column: 1; grid-row: 1; } #cell-1 { grid-column: 2; grid-row: 1; } #cell-2 { grid-column: 3; grid-row: 1; } #cell-3 { grid-column: 4; grid-row: 1; } #cell-4 { grid-column: 5; grid-row: 1; }
        #cell-5 { grid-column: 5; grid-row: 2; } #cell-6 { grid-column: 5; grid-row: 3; } #cell-7 { grid-column: 5; grid-row: 4; } #cell-8 { grid-column: 5; grid-row: 5; }
        #cell-9 { grid-column: 4; grid-row: 5; } #cell-10 { grid-column: 3; grid-row: 5; } #cell-11 { grid-column: 2; grid-row: 5; } #cell-12 { grid-column: 1; grid-row: 5; }
        #cell-13 { grid-column: 1; grid-row: 4; } #cell-14 { grid-column: 1; grid-row: 3; } #cell-15 { grid-column: 1; grid-row: 2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-column">
            <div class="board" id="board">
                <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
                <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
                <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
                <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
                <div class="center-zone">
                    <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
                    <div id="dado-valor">0</div>
                    <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
                    <div>💖 $<span id="dinero-mio">1000</span></div>
                </div>
            </div>
            <div id="banco-container">
                <button class="btn" style="width: 140px" onclick="abrirBanco()">🏦 Préstamo</button>
                <button class="btn" style="width: 140px" onclick="pagarPrestamo()">💳 Pagar Préstamo</button>
                <button class="btn" style="width: 140px" onclick="verSaldos()">💰 Ver Saldos</button>
                <button class="btn" style="width: 140px; background: #c71585;" onclick="abrirIntercambio()">🤝 Intercambiar</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="panel">
                <strong>Unirse a Sala</strong>
                <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
                <button class="btn" id="btn-unirse" onclick="unirse()">Entrar a la sala</button>
            </div>
            <div class="panel">
                <strong>Historial</strong><div id="log"></div>
                <strong>Chat</strong><div id="chat-log"></div>
                <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
                <button class="btn" onclick="enviarChat()">Enviar</button>
            </div>
        </div>
    </div>
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-text"></div>
        <div id="modal-extra"></div>
        <button class="btn" id="btn-cerrar" onclick="document.getElementById('modal').style.display='none';">Cerrar</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let miIdx = -1, sala = "", yaEntro = false;
        const nombres = ["Dog", "Horse", "Hat", "Car"];
        const colores = ["#ffb7b2", "#ffd8a8", "#b2f2bb", "#a5d8ff"];
        const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

        function log(txt) { db.ref('salas/' + sala + '/log').push(txt); }
        
        function unirse() { 
            if(yaEntro) return;
            sala = document.getElementById('sala-id').value; 
            if(!sala) return;
            yaEntro = true;
            document.getElementById('btn-unirse').disabled = true;
            db.ref('salas/' + sala + '/jugadores').once('value', snap => { 
                miIdx = snap.numChildren(); 
                db.ref('salas/' + sala + '/jugadores/' + miIdx).set({ pos: 0, dinero: 1000, enCarcel: 0, tienePrestamo: false, montoPrestamo: 0 }); 
                if(miIdx == 0) db.ref('salas/' + sala + '/turno').set(0); 
                db.ref('salas/' + sala + '/chat').push({ n: "Sistema", m: nombres[miIdx] + " ha entrado." });
                sincronizar(); 
            }); 
        }

        function sincronizar() {
            db.ref('salas/' + sala).on('value', snap => {
                let s = snap.val();
                if(!s) return;
                // Actualizar UI
                if(s.jugadores[miIdx]) document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
                document.getElementById('turno-text').innerText = "Turno: " + nombres[s.turno];
                
                // Tokens
                s.jugadores.forEach((j, i) => {
                    let el = document.getElementById('p' + i);
                    el.style.display = 'block';
                    let cell = document.getElementById('cell-' + j.pos);
                    el.style.left = (cell.offsetLeft + 35) + 'px';
                    el.style.top = (cell.offsetTop + 35) + 'px';
                });

                // Propiedades y casas
                if(s.propiedades) {
                    Object.keys(s.propiedades).forEach(pos => {
                        let cell = document.getElementById('cell-' + pos);
                        cell.style.backgroundColor = colores[s.propiedades[pos].owner];
                        let hc = cell.querySelector('.house-container');
                        hc.innerHTML = "";
                        let lvl = s.propiedades[pos].nivel || 0;
                        for(let i=0; i<lvl; i++) {
                            let h = document.createElement('div'); h.className = (lvl==5 ? 'hotel' : 'house');
                            hc.appendChild(h); if(lvl==5) break;
                        }
                    });
                }
                
                // Logs y Chat
                let chatH = ""; if(s.chat) Object.values(s.chat).forEach(c => chatH += "<b>"+c.n+":</b> "+c.m+"<br>");
                document.getElementById('chat-log').innerHTML = chatH;
                let logH = ""; if(s.log) Object.values(s.log).forEach(l => logH += l + "<br>");
                document.getElementById('log').innerHTML = logH;
            });
        }

        // Funciones básicas requeridas: tirar, comprar, mejorar, banco, etc. (Mantener la lógica original)
        function tirarDado() {
            db.ref('salas/'+sala).once('value', snap => {
                let s = snap.val();
                if(s.turno !== miIdx) return;
                let dado = Math.floor(Math.random()*6)+1;
                document.getElementById('dado-valor').innerText = dado;
                let nuevaPos = (s.jugadores[miIdx].pos + dado) % mapa.length;
                db.ref('salas/'+sala+'/jugadores/'+miIdx).update({pos: nuevaPos});
                db.ref('salas/'+sala+'/turno').set((s.turno + 1) % s.jugadores.length);
            });
        }

        function abrirBanco() {
            document.getElementById('modal-title').innerText = "Préstamo";
            let div = document.getElementById('modal-extra'); div.innerHTML = "";
            [200, 500, 800].forEach(m => {
                let b = document.createElement('button'); b.className = 'btn'; b.innerText = "Pedir $"+m;
                b.onclick = () => {
                    db.ref('salas/'+sala+'/jugadores/'+miIdx).update({dinero: firebase.database.ServerValue.increment(m), tienePrestamo: true, montoPrestamo: m});
                    document.getElementById('modal').style.display = 'none';
                };
                div.appendChild(b);
            });
            document.getElementById('modal').style.display = 'block';
        }

        function pagarPrestamo() {
            db.ref('salas/'+sala+'/jugadores/'+miIdx).once('value', snap => {
                let j = snap.val();
                if(j.tienePrestamo && j.dinero >= j.montoPrestamo) {
                    db.ref('salas/'+sala+'/jugadores/'+miIdx).update({dinero: firebase.database.ServerValue.increment(-j.montoPrestamo), tienePrestamo: false, montoPrestamo: 0});
                    log(nombres[miIdx] + " pagó el préstamo.");
                } else alert("No puedes pagar el préstamo.");
            });
        }

        function verSaldos() {
            db.ref('salas/'+sala+'/jugadores').once('value', snap => {
                let txt = ""; snap.forEach(c => txt += nombres[c.key] + ": $" + c.val().dinero + "<br>");
                document.getElementById('modal-title').innerText = "Saldos";
                document.getElementById('modal-text').innerHTML = txt;
                document.getElementById('modal').style.display = 'block';
            });
        }

        function enviarChat() { 
            let msg = document.getElementById('chat-msg').value; 
            db.ref('salas/'+sala+'/chat').push({n: nombres[miIdx], m: msg}); 
            document.getElementById('chat-msg').value = ""; 
        }

        // Inicializar tablero
        mapa.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = 'cell'; d.id = 'cell-' + i;
            d.innerHTML = `<div class="strip"></div>${m.n}<br>${m.p > 0 ? '$'+m.p : ''}<div class="house-container"></div>`;
            document.getElementById('board').appendChild(d);
        });
    </script>
</body>
</html>
