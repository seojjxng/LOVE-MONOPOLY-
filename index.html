<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; transition: 0.3s; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 70%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 11px; }
        
        .dice { width: 60px; height: 60px; background: #ff59aa; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #c71585; margin: 10px; transition: transform 0.2s; }
        .dice:active { transform: translateY(4px); box-shadow: 0 1px #c71585; }

        #log { height: 180px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="margin-bottom: 5px; font-size: 10px; font-weight: bold;">ESPERANDO...</div>
            <div id="dice-result">-</div>
            <div class="dice" onclick="tirarDado()">🎲</div>
            <button class="btn" onclick="comprar()">COMPRAR / MEJORAR</button>
            <div style="font-size: 12px; color: #c71585; margin-top: 10px;">💖 Tú: $<span id="dinero-mio">1000</span> | 💎 Amigo: $<span id="dinero-amigo">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <input type="text" id="peer-id" placeholder="ID amigo" style="width:100%; margin: 10px 0; padding: 5px;">
            <button class="btn" style="width:100%" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 10px;">Generando ID...</div>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, miDinero = 1000, amigoDinero = 1000, bloqueado = false;
    const mapa = [{n: "SALIDA", p:0}, {n: "TÉ ($100)", p:100, owner: null, level: 0}, {n: "SUERTE", p:0}, {n: "BOUTIQUE ($200)", p:200, owner: null, level: 0}, {n: "POLICÍA", p:0}, {n: "CAFÉ ($150)", p:150, owner: null, level: 0}, {n: "PARQUE ($120)", p:120, owner: null, level: 0}, {n: "TÉ ($100)", p:100, owner: null, level: 0}, {n: "SPA ($250)", p:250, owner: null, level: 0}, {n: "VILLA 1 ($300)", p:300, owner: null, level: 0}, {n: "MALL ($350)", p:350, owner: null, level: 0}, {n: "JOYAS ($400)", p:400, owner: null, level: 0}, {n: "VILLA 2 ($200)", p:200, owner: null, level: 0}, {n: "POLICÍA", p:0}, {n: "VILLA 3 ($220)", p:220, owner: null, level: 0}, {n: "GYM ($180)", p:180, owner: null, level: 0}, {n: "PRÉSTAMO", p:-200}, {n: "VIVIENDA", p:500}];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    function actualizarTurnoUI() {
        document.getElementById('turno-text').innerText = miTurno ? "¡ES TU TURNO!" : "ESPERANDO...";
    }

    function tirarDado() {
        if(!miTurno) return;
        if(bloqueado) { log("¡Turno perdido!"); bloqueado = false; miTurno = false; conn.send({type: 'MOVE', pos: miPos, lock: false}); actualizarTurnoUI(); return; }
        
        let val = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-result').innerText = val;
        let viejaPos = miPos;
        miPos = (miPos + val) % mapa.length;
        if (miPos < viejaPos) { miDinero += 100; log("Salida: +$100"); }
        
        let caePolicia = (mapa[miPos].n === "POLICÍA");
        if(caePolicia) { log("¡Cuidado, POLICÍA!"); bloqueado = true; }
        
        log("Caíste en " + mapa[miPos].n);
        conn.send({type: 'MOVE', pos: miPos, lock: caePolicia});
        miTurno = false;
        actualizarTurnoUI();
        log("Le toca a tu amorcito!");
    }

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; setup(); log("¡Conexión establecida!"); });
    
    function conectar() { 
        conn = peer.connect(document.getElementById('peer-id').value); 
        setup(); 
        miTurno = Math.random() > 0.5; // El que conecta decide al azar
        conn.send({type: 'START', turno: !miTurno}); // Avisa al otro
        actualizarTurnoUI();
        log("¡Conexión establecida!");
    }

    function setup() {
        conn.on('data', d => {
            if (d.type === 'START') { miTurno = d.turno; actualizarTurnoUI(); }
            if (d.type === 'MOVE') { miTurno = true; bloqueado = d.lock; actualizarTurnoUI(); log("¡Te toca lanzar!"); }
        });
    }

    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-' + i; d.innerText = m.n; document.getElementById('board').appendChild(d); });
</script>
</body>
</html>
