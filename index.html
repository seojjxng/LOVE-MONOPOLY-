<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .game-column { display: flex; flex-direction: column; gap: 15px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log, #chat-log { height: 120px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="game-column">
        <div class="board" id="board"></div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre sala">
            <button class="btn" onclick="iniciarConexion()">Entrar</button>
        </div>
        <div class="panel">
            <strong>Historial</strong><div id="log"></div>
            <strong>Chat</strong><div id="chat-log"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn" onclick="enviarChat()">Enviar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let miIdx = -1, sala = "";
    const mapa = [{n:"SALIDA"},{n:"IGLESIA"},{n:"?"},{n:"BOUTIQUE"},{n:"?"},{n:"CHEONGDAM"},{n:"GANGNAM"},{n:"SEOCHO"},{n:"MAPO"},{n:"INCHEON"},{n:"?"},{n:"CÁRCEL"},{n:"IMPUESTOS"},{n:"?"},{n:"ARCA"},{n:"BUKCHON"}];

    function iniciarConexion() {
        sala = document.getElementById('sala-id').value.trim();
        if(!sala) { alert("Por favor, escribe un nombre de sala"); return; }
        
        // Referencia a la sala
        const salaRef = db.ref('salas/'+sala);
        
        salaRef.child('jugadores').once('value', snap => {
            miIdx = snap.numChildren();
            // Creamos jugador si la sala está vacía o añadimos al nuevo
            salaRef.child('jugadores/'+miIdx).set({pos:0, dinero:1000}).then(() => {
                alert("¡Entraste a la sala: " + sala + "!");
                sincronizar();
            });
        });
    }

    function enviarChat() {
        if(!sala) return;
        let msg = document.getElementById('chat-msg').value;
        db.ref('salas/'+sala+'/chat').push({n: "Jugador "+miIdx, m: msg});
        document.getElementById('chat-msg').value = "";
    }

    function sincronizar() {
        db.ref('salas/'+sala).on('value', snap => {
            let s = snap.val();
            if(!s) return;
            
            // Sincronizar Log
            let l = "";
            if(s.log) Object.values(s.log).forEach(val => l += val + "<br>");
            document.getElementById('log').innerHTML = l;

            // Sincronizar Chat
            let c = "";
            if(s.chat) Object.values(s.chat).forEach(val => c += "<b>"+val.n+":</b> "+val.m+"<br>");
            document.getElementById('chat-log').innerHTML = c;
        });
    }

    mapa.forEach((m, i) => { 
        const d = document.createElement('div'); d.className = 'cell'; d.innerHTML = m.n; 
        document.getElementById('board').appendChild(d); 
    });
</script>
</body>
</html>
