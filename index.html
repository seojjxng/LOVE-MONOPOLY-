<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; transition: 0.3s; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .btn { width: 70%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 11px; }
        
        /* Modal Windows Rosa */
        #modal { display: none; position: fixed; top: 30%; left: 40%; width: 300px; background: #fff0f9; border: 3px solid #ff80bf; padding: 20px; border-radius: 5px; text-align: center; z-index: 100; box-shadow: 5px 5px 0 #ff80bf; }
        #log { height: 180px; width: 100%; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div id="modal">
    <h3 id="modal-title" style="color: #c71585;">¡Suerte!</h3>
    <p id="modal-desc"></p>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Aceptar</button>
</div>

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="margin-bottom: 5px; font-size: 10px; font-weight: bold;">ESPERANDO...</div>
            <div class="dice" onclick="tirarDado()" style="font-size: 40px; cursor: pointer;">🎲</div>
            <div style="font-size: 12px; color: #c71585; margin-top: 10px;">💖 Tú: $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar" style="width: 320px;">
        <div class="panel" style="background: #fff0f9; padding: 20px; border-radius: 20px;">
            <strong>Historial</strong>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    let miPos = 0, miDinero = 1000, miTurno = false, bloqueado = false;
    const mapa = [
        {n: "SALIDA", p:0}, {n: "TÉ", p:100}, {n: "SUERTE", p:0}, 
        {n: "BOUTIQUE", p:200}, {n: "POLICÍA", p:0}
    ];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    function activarSuerte() {
        const premios = [{m: "Lotería", v: 300}, {m: "Herencia", v: 500}, {m: "Dinero en la calle", v: 50}];
        const res = premios[Math.floor(Math.random() * premios.length)];
        miDinero += res.v;
        document.getElementById('modal-title').innerText = res.m;
        document.getElementById('modal-desc').innerText = "Ganaste $" + res.v;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('dinero-mio').innerText = miDinero;
    }

    function comprar(index) {
        if (index !== miPos) { log("Debes estar en la casilla para comprar."); return; }
        if (mapa[index].n === "SUERTE") { activarSuerte(); return; }
        if (mapa[index].p > 0) {
            miDinero -= mapa[index].p;
            document.getElementById('dinero-mio').innerText = miDinero;
            document.getElementById('cell-' + index).style.background = "#ffe4e9";
            log("Compraste " + mapa[index].n);
        }
    }

    function tirarDado() {
        if(!miTurno || bloqueado) return;
        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % mapa.length;
        log("Caíste en " + mapa[miPos].n);
        
        if (mapa[miPos].n === "POLICÍA") {
            log("¡Policía! Turno perdido.");
            bloqueado = true;
        }
        if (mapa[miPos].n === "SUERTE") activarSuerte();
    }

    // Generar tablero con botones
    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerText = m.n;
        d.onclick = () => comprar(i);
        board.appendChild(d);
    });
</script>
</body>
</html>
