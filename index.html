<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #fff0f9; padding: 20px; border: 3px solid #ff80bf; border-radius: 20px; text-align: center; z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn" onclick="unirse()">Entrar a Juego</button>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<div id="modal">
    <p id="modal-text"></p>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Aceptar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1, sala = "", miDinero = 1000;
    const colores = ["#ffccd5", "#ffe4e1", "#e0ffff", "#f0fff0", "#fff0f5"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"VILLA 3",p:220},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function agregarLog(txt) { document.getElementById('log').innerHTML += `<div>${txt}</div>`; }
    function mostrarModal(txt) { document.getElementById('modal-text').innerText = txt; document.getElementById('modal').style.display = 'block'; }

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/' + sala + '/jugadores').once('value', snap => {
            miIdx = snap.numChildren();
            db.ref('salas/' + sala + '/jugadores/' + miIdx).set({ pos: 0, carcel: 0 });
            document.getElementById('p' + miIdx).style.display = 'block';
            document.getElementById('turno-text').innerText = "Jugador " + (miIdx + 1);
            sincronizar();
            agregarLog("Entraste a la sala: " + sala);
        });
    }

    function tirarDado() {
        if(miIdx === -1) return;
        db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => {
            if(snap.val().carcel > 0) {
                mostrarModal("¡Estás en la cárcel! Espera un turno.");
                db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ carcel: snap.val().carcel - 1 });
                return;
            }
            let val = Math.floor(Math.random()*6)+1;
            let posActual = snap.val().pos;
            let nuevaPos = (posActual + val) % mapa.length;
            
            // Lógica Salida (+100)
            if(nuevaPos < posActual) { miDinero += 100; document.getElementById('dinero-mio').innerText = miDinero; agregarLog("Pasaste por salida, ganas $100"); }
            
            // Lógica Cárcel
            let esCarcel = 0;
            if(nuevaPos === 4) { nuevaPos = 11; esCarcel = 1; agregarLog("¡A LA CÁRCEL!"); }
            
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: nuevaPos, carcel: esCarcel });
            agregarLog("J" + (miIdx + 1) + " sacó " + val);
        });
    }

    function verificarCasilla(pos) {
        const div = document.getElementById('acciones'); div.innerHTML = "";
        db.ref('salas/' + sala + '/propiedades/' + pos).once('value', snap => {
            if(!snap.exists() && mapa[pos].p > 0) {
                div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar $${mapa[pos].p}</button>`;
            } else if(snap.exists() && snap.val().owner != miIdx) {
                let niv = snap.val().nivel || 1;
                let pct = (niv === 1) ? 0.10 : (niv === 2 ? 0.15 : 0.25);
                let alquiler = Math.floor(mapa[pos].p * pct);
                if(miDinero >= alquiler) {
                    miDinero -= alquiler;
                    document.getElementById('dinero-mio').innerText = miDinero;
                    db.ref('salas/' + sala + '/jugadores/' + snap.val().owner + '/dinero').transaction(d => (d || 1000) + alquiler);
                    agregarLog("Pagaste $" + alquiler + " de alquiler a J" + (snap.val().owner + 1));
                }
            }
        });
    }

    function comprar(pos) {
        if(miDinero >= mapa[pos].p) {
            db.ref('salas/' + sala + '/propiedades/' + pos).set({ owner: miIdx, nivel: 1 });
            miDinero -= mapa[pos].p;
            document.getElementById('dinero-mio').innerText = miDinero;
            document.getElementById('acciones').innerHTML = `<button class="btn" onclick="mejorar(${pos})">Mejorar</button>`;
            agregarLog("Compraste " + mapa[pos].n);
        }
    }

    function mejorar(pos) {
        db.ref('salas/' + sala + '/propiedades/' + pos).update({ nivel: 2 });
        agregarLog("Mejoraste " + mapa[pos].n);
        document.getElementById('acciones').innerHTML = "";
    }

    function sincronizar() {
        db.ref('salas/' + sala + '/jugadores').on('value', snap => {
            snap.forEach(child => {
                let el = document.getElementById('p' + child.key);
                let cell = document.getElementById('cell-' + child.val().pos);
                if(cell && el) { 
                    el.style.left = (cell.offsetLeft + 30) + 'px'; 
                    el.style.top = (cell.offsetTop + 30) + 'px'; 
                    if(child.key == miIdx) verificarCasilla(child.val().pos);
                }
            });
        });
        db.ref('salas/' + sala + '/propiedades').on('value', snap => {
            snap.forEach(child => {
                document.getElementById('cell-' + child.key).style.backgroundColor = colores[child.val().owner % colores.length];
            });
        });
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
