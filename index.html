<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(4, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 3; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #ff80bf; transform: scale(1.05); }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log, #chat-log { height: 150px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
        #modal, #contrato-modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        #dado-valor { font-size: 24px; font-weight: bold; margin: 10px 0; }
        #banco-container { grid-column: 1 / 6; grid-row: 4 / 5; display: flex; align-items: center; justify-content: center; background: #ffccd5; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <div id="dado-valor">0</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
        <div id="banco-container">
            <button class="btn" style="width: 200px" onclick="abrirBanco()">🏦 Solicitar Préstamo</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn" onclick="unirse()">Entrar a Juego</button>
        </div>
        <div class="panel">
            <strong>Historial</strong><div id="log"></div>
            <strong>Chat</strong><div id="chat-log"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn" onclick="enviarChat()">Enviar</button>
        </div>
    </div>
</div>

<div id="modal">
    <h3 id="modal-title" style="margin:0"></h3>
    <p id="modal-text" style="color:#c71585; font-weight:bold"></p>
    <div id="modal-extra"></div>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
</div>

<div id="contrato-modal">
    <h3>¡Contrato Firmado!</h3>
    <p>Has adquirido un préstamo bancario. El dinero ha sido añadido a tu cuenta.</p>
    <button class="btn" onclick="document.getElementById('contrato-modal').style.display='none'">Aceptar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1, sala = "";
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const colores = ["#ffccd5", "#dcd0ff", "#c1e1c1", "#fff9c4"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"VILLA 3",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];
    const eventos = [{txt:"¡Ganaste la lotería!", m:200, g:true}, {txt:"¡Heredaste una fortuna!", m:300, g:true}, {txt:"Debes impuestos sobre la renta", m:150, g:false}, {txt:"Le debes al banco", m:250, g:false}];

    function log(txt) { document.getElementById('log').innerHTML += `<div>${txt}</div>`; }

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/' + sala + '/jugadores').once('value', snap => {
            miIdx = snap.numChildren();
            if(miIdx > 3) return;
            db.ref('salas/' + sala + '/jugadores/' + miIdx).set({ pos: 0, dinero: 1000, enCarcel: false, deuda: 0 });
            if(miIdx == 0) db.ref('salas/' + sala + '/turno').set(0);
            sincronizar();
        });
    }

    function tirarDado() {
        if(miIdx === -1) return;
        db.ref('salas/' + sala).once('value', snap => {
            let s = snap.val();
            if(s.turno !== miIdx) return;
            let j = s.jugadores[miIdx];
            if(j.enCarcel) {
                db.ref('salas/' + sala + '/jugadores/' + miIdx + '/enCarcel').set(false);
                db.ref('salas/' + sala + '/turno').set((s.turno + 1) % s.jugadores.length);
                return;
            }
            let val = Math.floor(Math.random()*6)+1;
            document.getElementById('dado-valor').innerText = val;
            let nuevaPos = j.pos + val;
            
            if(nuevaPos >= mapa.length) {
                let ingreso = 100;
                let deuda = j.deuda || 0;
                if(deuda > 0) {
                    let pago = Math.min(ingreso * 0.5, deuda);
                    db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ 
                        dinero: (j.dinero || 0) + (ingreso - pago),
                        deuda: deuda - pago
                    });
                    log("Salida: +$"+ingreso+" (Banco retuvo $"+pago+" de tu deuda)");
                } else {
                    db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) + ingreso);
                    log("Pasaste por SALIDA: +$100");
                }
                nuevaPos = nuevaPos % mapa.length;
            }
            
            if(nuevaPos === 4) { 
                db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: 11, enCarcel: true }); 
                log(nombres[miIdx] + " fue arrestado.");
            } else { 
                db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: nuevaPos }); 
                verificarCasilla(nuevaPos, j.dinero);
            }
            db.ref('salas/' + sala + '/turno').set((s.turno + 1) % s.jugadores.length);
        });
    }

    function abrirBanco() {
        document.getElementById('modal-title').innerText = "Banco";
        document.getElementById('modal-text').innerText = "Solicita un préstamo:";
        let div = document.getElementById('modal-extra'); div.innerHTML = "";
        [200, 450, 600, 700].forEach(m => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = "Pedir $" + m;
            b.onclick = () => {
                db.ref('salas/' + sala + '/jugadores/' + miIdx).transaction(j => { 
                    if(j) { j.dinero = (j.dinero || 0) + m; j.deuda = (j.deuda || 0) + m; }
                    return j; 
                });
                document.getElementById('modal').style.display = 'none';
                document.getElementById('contrato-modal').style.display = 'block';
                log("Préstamo obtenido: +$" + m);
            };
            div.appendChild(b);
        });
        document.getElementById('modal').style.display = 'block';
    }

    function verificarCasilla(pos, dinero) {
        let div = document.getElementById('acciones'); div.innerHTML = "";
        let propRef = db.ref('salas/' + sala + '/propiedades/' + pos);
        
        if(pos === 12) {
            let impuestos = ["Prendas", "Agua", "Luz"];
            let tipo = impuestos[Math.floor(Math.random()*impuestos.length)];
            let monto = Math.floor(Math.random()*101) + 50;
            db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) - monto);
            document.getElementById('modal-title').innerText = "Impuesto: " + tipo;
            document.getElementById('modal-text').innerText = "Debes pagar por " + tipo + ": $" + monto;
            document.getElementById('modal').style.display = 'block';
            log("Impuesto de " + tipo + ": -$ " + monto);
            return;
        }

        propRef.once('value', s => {
            let prop = s.val();
            if(!prop && mapa[pos].p > 0) {
                if(dinero >= mapa[pos].p) div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar $${mapa[pos].p}</button>`;
            } else if(prop && prop.owner == miIdx) {
                let costoMejora = mapa[pos].p + 50;
                if(prop.nivel < 3) div.innerHTML = `<button class="btn" onclick="mejorar(${pos}, ${costoMejora})">Mejorar $${costoMejora}</button>`;
            } else if(prop && prop.owner != miIdx) {
                let renta = Math.floor(mapa[pos].p * (prop.nivel == 3 ? 0.5 : 0.2));
                db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => {
                    let j = snap.val();
                    let pagoReal = Math.min(renta, j.dinero);
                    let deuda = j.deuda || 0;
                    let retencion = Math.floor(pagoReal * 0.5);
                    
                    db.ref('salas/' + sala + '/jugadores/' + miIdx).update({
                        dinero: (j.dinero || 0) - pagoReal,
                        deuda: deuda - retencion
                    });
                    db.ref('salas/' + sala + '/jugadores/' + prop.owner + '/dinero').transaction(d => (d || 0) + (pagoReal - retencion));
                    log("Pagaste $" + pagoReal + " de alquiler (Banco retuvo $"+retencion+").");
                });
            } else if(mapa[pos].n == "?" || mapa[pos].n == "ARCA") {
                let ev = eventos[Math.floor(Math.random()*eventos.length)];
                db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) + (ev.g ? ev.m : -ev.m));
                document.getElementById('modal-title').innerText = mapa[pos].n;
                document.getElementById('modal-text').innerText = ev.txt + " ($" + ev.m + ")";
                document.getElementById('modal').style.display = 'block';
                log(mapa[pos].n + ": " + ev.txt + " ($" + ev.m + ")");
            }
        });
    }

    function comprar(pos) {
        db.ref('salas/' + sala + '/propiedades/' + pos).set({ owner: miIdx, nivel: 1 });
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - mapa[pos].p);
        log("Compraste " + mapa[pos].n);
    }

    function mejorar(pos, costo) {
        db.ref('salas/' + sala + '/propiedades/' + pos + '/nivel').transaction(n => (n || 1) + 1);
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - costo);
        log("Mejoraste propiedad.");
        document.getElementById('acciones').innerHTML = "";
    }

    function enviarChat() {
        let msg = document.getElementById('chat-msg').value;
        let t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        db.ref('salas/' + sala + '/chat').push({ n: nombres[miIdx], m: msg, t: t });
        document.getElementById('chat-msg').value = "";
    }

    function sincronizar() {
        db.ref('salas/' + sala).on('value', snap => {
            let s = snap.val(); if(!s) return;
            document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
            document.getElementById('turno-text').innerText = "Turno de: " + nombres[s.turno];
            s.jugadores.forEach((j, i) => {
                let el = document.getElementById('p' + i); el.style.display = 'block';
                let cell = document.getElementById('cell-' + j.pos);
                if(cell) { el.style.left = (cell.offsetLeft + 15 + (i*8)) + 'px'; el.style.top = (cell.offsetTop + 15) + 'px'; }
            });
            if(s.propiedades) Object.keys(s.propiedades).forEach(p => { let cell = document.getElementById('cell-'+p); if(cell) cell.style.backgroundColor = colores[s.propiedades[p].owner]; });
            if(s.chat) { let html = ""; Object.values(s.chat).forEach(c => html += `<div><b>${c.n}</b> [${c.t}]: ${c.m}</div>`); document.getElementById('chat-log').innerHTML = html; }
        });
    }

    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`; document.getElementById('board').appendChild(d); });
</script>
</body>
</html>
