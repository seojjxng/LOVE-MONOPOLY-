<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .game-layout { display: flex; gap: 20px; align-items: flex-start; }
        .board { display: grid; grid-template-columns: repeat(6, 100px); grid-template-rows: repeat(6, 100px); gap: 4px; background: #ff80bf; padding: 5px; border-radius: 20px; }
        .cell { background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; text-align: center; color: #ff59aa; }
        .center-ui { grid-column: 2/6; grid-row: 2/6; background: #fff5f7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .sidebar { width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: white; padding: 15px; border-radius: 15px; border: 3px solid #ffb3d9; }
        .btn { width: 100%; padding: 8px; background: #ff80bf; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; }
        .propiedad-comprada { background: #ffccd5 !important; border: 2px solid #ff59aa; }
    </style>
</head>
<body>

<div class="game-layout">
    <div class="board" id="board">
        <div class="center-ui">
            <div id="status">🎲 Tira el dado</div>
            <div style="font-size: 40px; cursor:pointer;" onclick="tirarDado()">🎲</div>
            <button class="btn" onclick="intentarComprar()">COMPRAR</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <div id="my-id" style="font-size:10px; word-break: break-all;">...</div>
            <input type="text" id="peer-id" placeholder="ID amigo" style="width:90%">
            <button class="btn" onclick="conectar()">💎 Conectar</button>
        </div>
        <div class="panel">
            <strong>Bancos</strong>
            <div id="bancos">💖 Tú: 1000 | 💎 Amigo: 1000</div>
        </div>
        <div class="panel" id="log" style="height:100px; font-size:10px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miDinero = 1000, miPos = 0;
    
    // Configuración de casillas tipo Monopoly
    const mapa = [
        {n: "SALIDA", t: "especial"}, {n: "TÉ", p: 200}, {n: "SUERTE", t: "evento"}, 
        {n: "BOUTIQUE", p: 250}, {n: "HOME", t: "especial"}, {n: "CAFÉ", p: 150},
        {n: "PARQUE", p: 100}, {n: "POLICÍA", t: "evento"}, {n: "SPA", p: 300},
        {n: "MALL", p: 400}, {n: "JOYAS", p: 500}, {n: "AEROPUERTO", t: "especial"}
    ];

    function buildBoard() {
        const board = document.getElementById('board');
        mapa.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = 'cell';
            div.id = 'cell-' + i;
            div.innerHTML = `<strong>${m.n}</strong>${m.p ? '<br>$'+m.p : ''}`;
            board.appendChild(div);
        });
    }

    function log(msg) { document.getElementById('log').innerHTML += `<div>> ${msg}</div>`; }

    peer.on('open', (id) => document.getElementById('my-id').innerText = id);
    peer.on('connection', (c) => { conn = c; log("Conectado con: " + c.peer); });

    function conectar() { conn = peer.connect(document.getElementById('peer-id').value); log("Conectando..."); }

    function tirarDado() {
        let dado = Math.floor(Math.random()*6)+1;
        miPos = (miPos + dado) % mapa.length;
        log("Avanzaste a: " + mapa[miPos].n);
        document.querySelectorAll('.cell').forEach(c => c.style.border = "none");
        document.getElementById('cell-'+miPos).style.border = "3px solid #ff0084";
    }

    function intentarComprar() {
        if(mapa[miPos].p && miDinero >= mapa[miPos].p) {
            miDinero -= mapa[miPos].p;
            document.getElementById('cell-'+miPos).classList.add('propiedad-comprada');
            log("Compraste " + mapa[miPos].n);
            document.getElementById('bancos').innerText = `💖 Tú: ${miDinero} | 💎 Amigo: ???`;
        } else {
            log("No puedes comprar esto.");
        }
    }

    buildBoard();
</script>
</body>
</html>
