<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .game-wrapper { display: flex; gap: 20px; max-width: 1000px; }
        
        /* Tablero tipo Monopoly */
        .board { display: grid; grid-template-columns: repeat(6, 120px); grid-template-rows: repeat(6, 120px); gap: 2px; background: #ffccd5; padding: 5px; border: 4px solid #ff80bf; }
        .cell { background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; text-align: center; border: 1px solid #ffe6f2; }
        .center-ui { grid-column: 2 / 6; grid-row: 2 / 6; background: #fff5f7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }

        /* Panel derecho */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: white; border: 3px solid #ffb3d9; border-radius: 15px; padding: 15px; }
        .panel h3 { margin: 0 0 10px 0; font-size: 14px; color: #ff59aa; border-bottom: 2px solid #ffe6f2; }
        .btn { width: 100%; padding: 10px; background: #ff80bf; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; }
        .history { height: 150px; overflow-y: auto; font-size: 11px; color: #8a7c8c; background: #fff9fa; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="board" id="board">
        <div class="center-ui">
            <div id="turn-display">TURNO DE NAEUN (J1)</div>
            <div style="font-size: 50px; cursor: pointer;" onclick="tirarDado()">🎲</div>
            <button class="btn" style="background:#ff59aa;">COMPRAR PROPIEDAD</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h3>Conexión Multijugador</h3>
            <div id="my-peer-id" style="font-size:12px; margin-bottom:5px;">Tu ID: barbie-game-123</div>
            <input type="text" id="rival-peer-id" style="width:100%; margin-bottom:5px;">
            <button class="btn">💎 CONECTAR</button>
        </div>

        <div class="panel">
            <h3>Bancos Individuales</h3>
            <div style="font-size: 14px;">💖 Naeun: 1050 💎</div>
            <div style="font-size: 14px;">💎 Seojun: 1320 💎</div>
        </div>

        <div class="panel">
            <h3>Historial de la Villa</h3>
            <div class="history" id="event-log">
                [09:12] Conectado al servidor...<br>
                [09:13] Naeun compró Boutique.
            </div>
        </div>
        <button class="btn" style="background:#ffccd5;">Reiniciar Todo</button>
    </div>
</div>

<script>
    // Generar casillas del borde (simulación)
    const board = document.getElementById('board');
    for(let i=0; i<20; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = `<strong>TÉ</strong><br>$200 💎`;
        board.appendChild(cell);
    }
    
    function log(msg) {
        const logBox = document.getElementById('event-log');
        logBox.innerHTML += `<br>[09:15] ${msg}`;
    }

    function tirarDado() {
        const val = Math.floor(Math.random()*6)+1;
        log("Naeun tiró dado: " + val);
    }
</script>
</body>
</html>
