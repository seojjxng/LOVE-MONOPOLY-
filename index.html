<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 1000px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(6, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #ff80bf; transform: scale(1.05); }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log { height: 150px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; }
    </style>
</head>
<body>
<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text">ESPERANDO...</div>
            <div id="dado-valor">0</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse</strong><input type="text" id="sala-id" class="input-field"><button class="btn" onclick="unirse()">Entrar</button>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>
<div id="modal"><h3 id="modal-title"></h3><p id="modal-text"></p><button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button></div>

<script>
    const db = firebase.database();
    const coords = [{x: 485, y: 580}, {x: 377, y: 580}, {x: 269, y: 580}, {x: 161, y: 580}, {x: 53, y: 580}, {x: 53, y: 472}, {x: 53, y: 364}, {x: 53, y: 256}, {x: 53, y: 148}, {x: 53, y: 40}, {x: 161, y: 40}, {x: 269, y: 40}, {x: 377, y: 40}, {x: 485, y: 40}, {x: 485, y: 148}, {x: 485, y: 256}];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];
    let miIdx = -1, sala = "";
    const nombres = ["Dog", "Horse", "Hat", "Car"];

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/'+sala+'/jugadores').once('value', snap => {
            miIdx = snap.numChildren();
            db.ref('salas/'+sala+'/jugadores/'+miIdx).set({pos: 0, dinero: 1000});
            if(miIdx == 0) db.ref('salas/'+sala+'/turno').set(0);
            sincronizar();
        });
    }

    function tirarDado() {
        db.ref('salas/'+sala).once('value', snap => {
            let s = snap.val();
            if(s.turno !== miIdx) return;
            let val = Math.floor(Math.random()*6)+1;
            let nuevaPos = (s.jugadores[miIdx].pos + val) % 16;
            let act = s.jugadores[miIdx];

            // Alquiler
            if(s.propiedades && s.propiedades[nuevaPos] && s.propiedades[nuevaPos].dueno != miIdx) {
                let renta = Math.floor(mapa[nuevaPos].p * 0.2);
                act.dinero -= renta;
                db.ref('salas/'+sala+'/jugadores/'+s.propiedades[nuevaPos].dueno+'/dinero').transaction(d => d + renta);
                alert("Pagaste $" + renta + " de renta.");
            }

            // Acciones
            if(mapa[nuevaPos].p > 0 && (!s.propiedades || !s.propiedades[nuevaPos])) {
                document.getElementById('acciones').innerHTML = `<button class="btn" onclick="comprar(${nuevaPos})">Comprar $${mapa[nuevaPos].p}</button>`;
            } else { document.getElementById('acciones').innerHTML = ""; }

            db.ref('salas/'+sala+'/jugadores/'+miIdx).update({pos: nuevaPos, dinero: act.dinero});
            db.ref('salas/'+sala+'/turno').set((s.turno + 1) % s.jugadores.length);
        });
    }

    function comprar(idx) {
        db.ref('salas/'+sala).once('value', snap => {
            let s = snap.val();
            if(s.jugadores[miIdx].dinero >= mapa[idx].p) {
                db.ref('salas/'+sala+'/propiedades/'+idx).set({dueno: miIdx});
                db.ref('salas/'+sala+'/jugadores/'+miIdx+'/dinero').set(s.jugadores[miIdx].dinero - mapa[idx].p);
                document.getElementById('acciones').innerHTML = "¡Comprado!";
            }
        });
    }

    function sincronizar() {
        db.ref('salas/'+sala).on('value', snap => {
            let s = snap.val();
            document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
            s.jugadores.forEach((j, i) => {
                let el = document.getElementById('p'+i); el.style.display = 'block';
                let pos = coords[j.pos];
                el.style.left = (pos.x + (i*8)) + 'px'; el.style.top = (pos.y + 5) + 'px';
            });
        });
    }

    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.innerHTML = m.n; document.getElementById('board').appendChild(d); });
</script>
</body>
</html>
