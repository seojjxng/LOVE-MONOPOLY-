<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; }
        .owned-host { background-color: #add8e6 !important; }
        .owned-visitante { background-color: #ffb6c1 !important; }
        .owned-hat { background-color: #fffacd !important; }
        .owned-car { background-color: #98fb98 !important; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; margin: 10px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
        .chat-box { width: 950px; margin-top: 20px; background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        #chat-messages { height: 100px; overflow-y: auto; background: white; border: 1px solid #ffccd5; border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        #notification-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff0f9; border: 3px solid #ff80bf; padding: 20px; border-radius: 5px; z-index: 100; box-shadow: 5px 5px 0px #ffccd5; text-align: center; color: #c71585; }
    </style>
</head>
<body>

<div id="notification-modal">
    <div id="modal-title" style="font-weight:bold; font-size: 16px; margin-bottom: 5px;"></div>
    <div id="modal-text" style="font-size: 12px; margin-bottom: 15px;"></div>
    <button class="btn" onclick="document.getElementById('notification-modal').style.display='none'">OK</button>
</div>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">
        <img src="https://i.imgur.com/u2AtssG.png" id="p3" class="token">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p4" class="token">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <div id="dice-result" style="font-size: 20px; font-weight: bold; margin: 5px;"></div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <button class="btn" onclick="mejorar()" style="background:#ff80bf;">MEJORAR (+)</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <input type="text" id="peer-id" class="input-field" placeholder="ID amigo">
            <button class="btn" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 11px; margin-top: 5px;">Iniciando...</div>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<div class="chat-box">
    <strong>Chat</strong>
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" class="input-field" placeholder="Escribe un mensaje...">
    <button class="btn" onclick="enviarMensaje()">Enviar</button>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, juegoIniciado = false, playerIndex = 0;
    let miDinero = 1000, jugadores = ["Dog", "Caballo", "Hat", "Car"];
    
    const mapa = [
        {n: "SALIDA", p:0, up:0}, {n: "IGLESIA", p:100, owner:null, up:0}, {n: "?", p:0, up:0}, {n: "BOUTIQUE", p:200, owner:null, up:0}, 
        {n: "¡A LA CÁRCEL!", p:0, up:0}, {n: "CHEONGDAM", p:500, owner:null, up:0}, {n: "GANGNAM", p:520, owner:null, up:0}, {n: "SEOCHO-GU", p:250, owner:null, up:0}, 
        {n: "MAPO", p:300, owner:null, up:0}, {n: "INCHEON", p:350, owner:null, up:0}, {n: "JOYAS", p:400, owner:null, up:0}, {n: "CÁRCEL", p:0, up:0}, 
        {n: "VILLA 3", p:220, owner:null, up:0}, {n: "?", p:0, up:0}, {n: "ARCA COMUNAL", p:0, up:0}, {n: "BUKCHON", p:500, owner:null, up:0}
    ];

    function showModal(title, msg) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-text').innerText = msg; document.getElementById('notification-modal').style.display = 'block'; }
    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function getHora() { return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }
    
    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        if(input.value && conn) {
            let user = jugadores[playerIndex];
            conn.send({type: 'CHAT', msg: input.value, user: user});
            document.getElementById('chat-messages').innerHTML += `<div>[${getHora()}] <b>${user}:</b> ${input.value}</div>`;
            input.value = '';
        }
    }

    function moverFichas(idx, pos) {
        const el = document.getElementById('p' + (idx + 1));
        const cell = document.getElementById('cell-' + pos);
        if(cell && el) { el.style.left = (cell.offsetLeft + (10 + idx*5)) + 'px'; el.style.top = (cell.offsetTop + 30) + 'px'; }
    }

    function tirarDado() {
        if(!juegoIniciado || !miTurno) return;
        let val = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-result').innerText = val;
        miPos = (miPos + val) % mapa.length;
        
        if (mapa[miPos].n === "¡A LA CÁRCEL!") {
            miPos = 11;
            log("¡A LA CÁRCEL!");
        }
        
        moverFichas(playerIndex, miPos);
        miTurno = false;
        if(conn) conn.send({type: 'MOVE', idx: playerIndex, pos: miPos, next: (playerIndex + 1) % 4});
    }

    function comprar() {
        let actual = mapa[miPos];
        let ownerTag = ['owned-host', 'owned-visitante', 'owned-hat', 'owned-car'][playerIndex];
        if(!actual.owner && actual.p > 0 && miDinero >= actual.p) {
            miDinero -= actual.p;
            actual.owner = jugadores[playerIndex];
            document.getElementById('cell-' + miPos).classList.add(ownerTag);
            document.getElementById('dinero-mio').innerText = miDinero;
            if(conn) conn.send({type: 'BUY', pos: miPos, owner: actual.owner, tag: ownerTag});
        }
    }

    function mejorar() {
        let actual = mapa[miPos];
        if(actual.owner === jugadores[playerIndex] && actual.up < 2) {
            actual.up++; log("Mejorado a nivel " + actual.up);
            if(conn) conn.send({type: 'UPGRADE', pos: miPos, up: actual.up});
        }
    }

    function conectar() { 
        playerIndex = 0; // Host es siempre el primero
        conn = peer.connect(document.getElementById('peer-id').value); setupConn(); 
    }

    function setupConn() {
        conn.on('data', d => {
            if(d.type === 'CHAT') document.getElementById('chat-messages').innerHTML += `<div>[${getHora()}] <b>${d.user}:</b> ${d.msg}</div>`;
            if(d.type === 'MOVE') {
                moverFichas(d.idx, d.pos);
                if(d.next === playerIndex) miTurno = true;
            }
            if(d.type === 'BUY') {
                mapa[d.pos].owner = d.owner;
                document.getElementById('cell-' + d.pos).classList.add(d.tag);
            }
        });
    }

    peer.on('open', id => document.getElementById('my-id').innerText = "ID: " + id);
    peer.on('connection', c => { conn = c; setupConn(); juegoIniciado = true; });

    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
