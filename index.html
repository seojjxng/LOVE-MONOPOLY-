<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .main-wrapper { display: flex; gap: 20px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 30px; height: 30px; position: absolute; z-index: 10; transition: all 0.5s ease; border-radius: 50%; border: 2px solid white; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { width: 90%; padding: 10px; margin: 5px 0; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .modal-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #ff80bf; color: white; border: none; border-radius: 5px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; z-index: 999; }
        #dado-display { font-size: 50px; color: #ff59aa; font-weight: bold; }
        .sidebar { width: 300px; }
        #cell-0 { grid-column: 1; grid-row: 1; } #cell-1 { grid-column: 2; grid-row: 1; } #cell-2 { grid-column: 3; grid-row: 1; } #cell-3 { grid-column: 4; grid-row: 1; } #cell-4 { grid-column: 5; grid-row: 1; }
        #cell-5 { grid-column: 5; grid-row: 2; } #cell-6 { grid-column: 5; grid-row: 3; } #cell-7 { grid-column: 5; grid-row: 4; } #cell-8 { grid-column: 5; grid-row: 5; }
        #cell-9 { grid-column: 4; grid-row: 5; } #cell-10 { grid-column: 3; grid-row: 5; } #cell-11 { grid-column: 2; grid-row: 5; } #cell-12 { grid-column: 1; grid-row: 5; }
        #cell-13 { grid-column: 1; grid-row: 4; } #cell-14 { grid-column: 1; grid-row: 3; } #cell-15 { grid-column: 1; grid-row: 2; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text">Esperando...</div>
            <div id="dado-display">0</div>
            <button class="btn" onclick="tirarDado()">Lanzar Dado</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
        <!-- Fichas -->
        <div id="tokens-container"></div>
    </div>
    
    <div class="sidebar">
        <button class="btn" onclick="abrirBanco()">🏦 Banco (Préstamos)</button>
        <button class="btn" onclick="verSaldos()">💰 Ver Saldos</button>
        <div id="acciones"></div>
        <div id="chat-log" style="height:200px; overflow-y:scroll; background:white; padding:10px;"></div>
    </div>
</div>

<div id="modal"><h3 id="modal-title"></h3><div id="modal-content"></div><button class="modal-btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button></div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let miIdx = -1, sala = "NaeunTown"; 
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"CÁRCEL",p:0},{n:"SEOUL",p:500},{n:"GANGNAM",p:520},{n:"JEJU",p:250},{n:"BUSAN",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"PARKING",p:0},{n:"IMPUESTOS",p:150},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function tirarDado() {
        let val = Math.floor(Math.random()*6)+1;
        document.getElementById('dado-display').innerText = val;
        db.ref('salas/'+sala+'/jugadores/'+miIdx).once('value', s => {
            let j = s.val();
            let pos = (j.pos + val) % mapa.length;
            db.ref('salas/'+sala+'/jugadores/'+miIdx+'/pos').set(pos);
            verificarCasilla(pos);
        });
    }

    function verificarCasilla(pos) {
        let div = document.getElementById('acciones'); div.innerHTML = "";
        if(mapa[pos].p > 0) {
            div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar ${mapa[pos].n} ($${mapa[pos].p})</button>`;
        }
    }

    function comprar(pos) {
        db.ref('salas/'+sala+'/propiedades/'+pos).set({owner: miIdx});
        document.getElementById('acciones').innerHTML = "¡Propiedad Adquirida!";
    }

    function abrirBanco() {
        document.getElementById('modal-title').innerText = "Solicitar Préstamo";
        let cont = document.getElementById('modal-content'); cont.innerHTML = "";
        [200, 500, 1000].forEach(m => {
            let b = document.createElement('button'); b.className = 'modal-btn'; b.innerText = "Préstamo de $" + m;
            b.onclick = () => { db.ref('salas/'+sala+'/jugadores/'+miIdx).transaction(j => { j.dinero += m; j.deuda += m; return j; }); document.getElementById('modal').style.display='none'; };
            cont.appendChild(b);
        });
        document.getElementById('modal').style.display = 'block';
    }

    function verSaldos() {
        document.getElementById('modal-title').innerText = "Finanzas";
        db.ref('salas/'+sala+'/jugadores').once('value', s => {
            let cont = document.getElementById('modal-content'); cont.innerHTML = "";
            s.forEach(c => {
                let d = document.createElement('div'); d.style.padding = "5px"; d.style.borderBottom = "1px solid #ffccd5";
                d.innerText = nombres[c.key] + ": $" + c.val().dinero + " (Deuda: $" + c.val().deuda + ")";
                cont.appendChild(d);
            });
            document.getElementById('modal').style.display = 'block';
        });
    }

    // Inicializar Tablero
    mapa.forEach((m, i) => {
        const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-'+i;
        d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        document.getElementById('board').appendChild(d);
    });

    // Crear Fichas
    nombres.forEach((n, i) => {
        const t = document.createElement('div'); t.className = 'token'; t.id = 'token-'+i;
        t.style.background = ["#ff59aa", "#aaddff", "#aaffaa", "#ffeeaa"][i];
        document.getElementById('tokens-container').appendChild(t);
    });

    db.ref('salas/'+sala).on('value', s => {
        let d = s.val(); if(!d) return;
        d.jugadores.forEach((j, i) => {
            let cell = document.getElementById('cell-'+j.pos);
            let token = document.getElementById('token-'+i);
            token.style.left = (cell.offsetLeft + 5) + 'px';
            token.style.top = (cell.offsetTop + 5) + 'px';
        });
    });
</script>
</body>
</html>
