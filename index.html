<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; width: 300px; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #modal { display: none; position: fixed; top: 30%; left: 35%; width: 300px; background: #fff0f9; border: 3px solid #ff80bf; border-radius: 15px; padding: 20px; text-align: center; z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text">Entra a una sala</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:50px; cursor:pointer" onclick="jugar()">
            <div id="dinero">💖 $1000</div>
        </div>
    </div>
    <div class="panel">
        <input type="text" id="sala" placeholder="Nombre sala" style="width:90%; padding:5px; margin-bottom:10px">
        <button class="btn" onclick="unirse()">ENTRAR</button>
    </div>
</div>

<div id="modal"><p id="m-text"></p><button class="btn" onclick="this.parentElement.style.display='none'">OK</button></div>

<script>
    firebase.initializeApp({databaseURL: "https://monopolovely-default-rtdb.firebaseio.com"});
    const db = firebase.database();
    let idS, miIdx, pos=0;
    const mapa = [{n:"SALIDA"},{n:"IGLESIA"},{n:"?"},{n:"BOUTIQUE"},{n:"CARCEL"},{n:"CHEONGDAM"},{n:"GANGNAM"},{n:"SEOCHO"},{n:"MAPO"},{n:"INCHEON"},{n:"JOYAS"},{n:"CARCEL"},{n:"VILLA 3"},{n:"?"},{n:"ARCA"},{n:"BUKCHON"}];

    function unirse() {
        idS = document.getElementById('sala').value;
        db.ref('salas/'+idS+'/j').once('value', s => {
            miIdx = s.numChildren();
            db.ref('salas/'+idS+'/j/'+miIdx).set({pos:0, t:true});
            document.getElementById('p'+miIdx).style.display='block';
            db.ref('salas/'+idS+'/j').on('value', snap => {
                snap.forEach(c => {
                    let p = document.getElementById('p'+c.key);
                    let cell = document.getElementById('c'+c.val().pos);
                    p.style.left = (cell.offsetLeft+30)+'px';
                    p.style.top = (cell.offsetTop+30)+'px';
                });
            });
        });
    }

    function jugar() {
        let val = Math.floor(Math.random()*6)+1;
        pos = (pos + val) % 16;
        if(pos == 4) pos = 11;
        db.ref('salas/'+idS+'/j/'+miIdx).update({pos: pos});
        if(mapa[pos].n == "?" || mapa[pos].n == "ARCA") {
            let m = Math.floor(Math.random()*170)+80;
            document.getElementById('m-text').innerText = "Evento: $"+m;
            document.getElementById('modal').style.display='block';
        }
    }

    const b = document.getElementById('board');
    mapa.forEach((m, i) => {
        let d = document.createElement('div');
        d.className='cell'; d.id='c'+i; d.innerHTML=m.n;
        b.appendChild(d);
    });
</script>
</body>
</html>
