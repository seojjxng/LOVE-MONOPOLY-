<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="status" style="font-weight:bold; font-size:12px;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de sala">
            <button class="btn" onclick="unirseASala()">Entrar a Juego</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1, sala = "";
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"VILLA 3",p:220},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function unirseASala() {
        sala = document.getElementById('sala-id').value;
        if (!sala) return alert("Escribe un nombre de sala");

        // Usamos push para crear un ID único de jugador automáticamente
        const jugadoresRef = db.ref('salas/' + sala + '/jugadores');
        const miJugadorRef = jugadoresRef.push();
        
        miJugadorRef.set({ pos: 0 }).then(() => {
            miIdx = miJugadorRef.key;
            document.getElementById('status').innerText = "Conectado como Jugador";
            sincronizar();
        });
    }

    function sincronizar() {
        db.ref('salas/' + sala + '/jugadores').on('value', snap => {
            snap.forEach(child => {
                const idFicha = Object.keys(snap.val()).indexOf(child.key);
                const el = document.getElementById('p' + idFicha);
                const cell = document.getElementById('cell-' + child.val().pos);
                if(cell && el) { 
                    el.style.display = 'block';
                    el.style.left = (cell.offsetLeft + 30) + 'px'; 
                    el.style.top = (cell.offsetTop + 30) + 'px'; 
                }
            });
        });
    }

    function tirarDado() {
        if(!sala || !miIdx) return;
        let val = Math.floor(Math.random()*6)+1;
        db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => {
            let nuevaPos = (snap.val().pos + val) % mapa.length;
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: nuevaPos });
        });
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
