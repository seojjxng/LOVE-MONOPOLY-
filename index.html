<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let miIdx = -1, sala = "", yaEntro = false;
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const colores = ["#ffb7b2", "#ffd8a8", "#b2f2bb", "#a5d8ff"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    let alquilerPendiente = null;
    let turnosSeis = 0;

    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
    } 

    function abrirModal(titulo, texto, htmlExtra = "") {
        document.getElementById('modal-title').innerText = titulo;
        document.getElementById('modal-text').innerHTML = texto;
        document.getElementById('modal-extra').innerHTML = htmlExtra;
        document.getElementById('modal').style.display = 'block';
    }

    function log(txt) { db.ref('salas/' + sala + '/log').push(txt); }
    
    function unirse() { 
        if(yaEntro) return;
        sala = document.getElementById('sala-id').value; 
        if(!sala) return;
        yaEntro = true;
        document.getElementById('btn-unirse').disabled = true;
        db.ref('salas/' + sala + '/jugadores').once('value', snap => { 
            miIdx = snap.numChildren(); 
            db.ref('salas/' + sala + '/jugadores/' + miIdx).set({ pos: 0, dinero: 1000, enCarcel: 0, tienePrestamo: false, montoPrestamo: 0 }); 
            if(miIdx == 0) db.ref('salas/' + sala + '/turno').set(0); 
            db.ref('salas/' + sala + '/chat').push({ n: "Sistema", m: nombres[miIdx] + " ha entrado a la sala." });
            sincronizar(); 
        }); 
    }
    
    function tirarDado() { 
        if(miIdx === -1) return;
        db.ref('salas/' + sala).once('value', snap => {
            let s = snap.val(); 
            if(s.turno !== miIdx || s.jugadores[miIdx].enCarcel > 0) return;
            let dado = Math.floor(Math.random()*6)+1;
            document.getElementById('dado-valor').innerText = dado;
            let posActual = Number(s.jugadores[miIdx].pos);
            let nuevaPos = (posActual + dado) % mapa.length;
            if (nuevaPos < posActual) {
                db.ref('salas/'+sala+'/jugadores/'+miIdx+'/dinero').transaction(d => d + 100);
                log(nombres[miIdx] + " pasó por SALIDA y cobró $100.");
            }
            db.ref('salas/'+sala+'/jugadores/'+miIdx).update({pos: nuevaPos});
            setTimeout(() => manejarCasilla(nuevaPos), 500);
        }); 
    }

    function verPropiedad(pos, esCaida = false) {
        let p = mapa[pos];
        if (p.p === 0) return;
        let extra = document.getElementById('modal-extra'); 
        extra.innerHTML = "";
        db.ref('salas/' + sala + '/propiedades/' + pos).once('value', snap => {
            let prop = snap.val();
            document.getElementById('modal-title').innerText = "Tarjeta de Propiedad";
            let htmlCard = `<div class="card-property"><div class="card-header">${p.n}</div><p>Valor: <b>$${p.p}</b></p>`;
            
            if (!prop) {
                htmlCard += `<p>Estado: <b>Disponible</b></p>`;
                if(esCaida) extra.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar</button>`;
            } else if (prop.owner === miIdx) {
                htmlCard += `<p>Dueño: <b>Tú</b></p>`;
                extra.innerHTML += `<button class="btn" onclick="mejorar(${pos})">Mejorar ($50)</button>`;
            } else {
                let alquiler = Math.floor(p.p * 0.1);
                htmlCard += `<p>Dueño: <b>${nombres[prop.owner]}</b></p><p>Alquiler: <b>$${alquiler}</b></p>`;
                if(esCaida) {
                    extra.innerHTML = `<button class="btn" onclick="procesarPago(${miIdx}, ${prop.owner}, ${alquiler})">Pagar Alquiler</button>
                    <button class="btn" style="background:#ff80bf" onclick="intentarEvasion(${miIdx}, ${prop.owner}, ${alquiler})">Intentar Evasión</button>`;
                }
            }
            htmlCard += `</div>`; 
            abrirModal("Tarjeta de Propiedad", htmlCard, extra.innerHTML);
        });
    }

    // Funciones de utilidad necesarias para que lo anterior no falle
    function comprar(pos) { db.ref('salas/' + sala + '/propiedades/' + pos).set({owner: miIdx, nivel: 0, hipotecada: false}); cerrarModal(); }
    function mejorar(pos) { db.ref('salas/' + sala + '/propiedades/' + pos + '/nivel').transaction(n => (Number(n) || 0) + 1); cerrarModal(); }
    function procesarPago(d, a, m) { db.ref('salas/' + sala + '/jugadores/' + d + '/dinero').transaction(d => d - m); db.ref('salas/' + sala + '/jugadores/' + a + '/dinero').transaction(d => d + m); cerrarModal(); }
    function intentarEvasion(d, a, m) { let exito = Math.random() < 0.3; log(nombres[d] + (exito ? " evadió" : " falló")); cerrarModal(); }
    function manejarCasilla(pos) { verPropiedad(pos, true); }
    function sincronizar() { db.ref('salas/' + sala).on('value', snap => { /* tu lógica original */ }); }

    mapa.forEach((m, i) => { 
        const d = document.createElement('div'); 
        d.className = 'cell'; d.id = 'cell-' + i; 
        d.onclick = () => verPropiedad(i);
        d.innerHTML = `<div class="strip"></div>${m.n}<br>${m.p > 0 ? '$'+m.p : ''}<div class="house-container"></div>`; 
        document.getElementById('board').appendChild(d); 
    });
</script>
