<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .owned-host { background-color: #add8e6 !important; }
        .owned-visitante { background-color: #ffb6c1 !important; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 4; grid-row: 2 / 4; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; margin: 10px; }
        #log { height: 200px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold; font-size: 12px;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <button class="btn" onclick="mejorar()" style="background:#ff80bf;">MEJORAR (+)</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBV8Kcd8mF2CGlIRWDxDR6B3f1_50V3FH0",
        authDomain: "monopolovely.firebaseapp.com",
        databaseURL: "https://monopolovely-default-rtdb.firebaseio.com",
        projectId: "monopolovely",
        storageBucket: "monopolovely.firebasestorage.app",
        messagingSenderId: "325639499908",
        appId: "1:325639499908:web:94ad73a6d82da77ce552d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const miIdx = Math.floor(Math.random() * 2); 
    const nombres = ["HOST", "VISITANTE"];
    const mapa = [
        {n: "SALIDA", p:0}, {n: "IGLESIA", p:100}, {n: "?", p:0}, {n: "BOUTIQUE", p:200},
        {n: "CÁRCEL!", p:0}, {n: "CHEONGDAM", p:500}, {n: "GANGNAM", p:520}, {n: "SEOCHO", p:250},
        {n: "MAPO", p:300}, {n: "INCHEON", p:350}, {n: "JOYAS", p:400}, {n: "CÁRCEL", p:0},
        {n: "VILLA 3", p:220}, {n: "?", p:0}, {n: "ARCA", p:0}, {n: "BUKCHON", p:500}
    ];

    // Renderizar Mapa
    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });

    // Sincronización
    db.ref('game').on('value', snap => {
        const data = snap.val();
        if(!data) { db.ref('game').set({turno: 0, pos: [0,0], owner: Array(16).fill(null)}); return; }
        
        document.getElementById('turno-text').innerText = "TURNO: " + nombres[data.turno];
        data.pos.forEach((p, i) => {
            const el = document.getElementById('p'+i);
            const cell = document.getElementById('cell-'+p);
            if(cell && el) { el.style.left = (cell.offsetLeft + 10) + 'px'; el.style.top = (cell.offsetTop + 10) + 'px'; }
        });
        
        data.owner.forEach((o, i) => {
            if(o) document.getElementById('cell-'+i).className = 'cell ' + (o === 'HOST' ? 'owned-host' : 'owned-visitante');
        });
    });

    function tirarDado() {
        db.ref('game').once('value').then(snap => {
            let data = snap.val();
            if(data.turno !== miIdx) return;
            let p = data.pos;
            p[miIdx] = (p[miIdx] + Math.floor(Math.random()*6)+1) % 16;
            db.ref('game').update({ pos: p, turno: (data.turno === 0 ? 1 : 0) });
            log("Tiraste y avanzaste a " + p[miIdx]);
        });
    }

    function comprar() {
        db.ref('game').once('value').then(snap => {
            let data = snap.val();
            let pos = data.pos[miIdx];
            if(!data.owner[pos]) {
                let owners = data.owner;
                owners[pos] = nombres[miIdx];
                db.ref('game').update({ owner: owners });
                log("Compraste " + mapa[pos].n);
            }
        });
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>${m}</div>`; l.scrollTop = l.scrollHeight; }
    function mejorar() { log("Mejorado!"); }
</script>
</body>
</html>
