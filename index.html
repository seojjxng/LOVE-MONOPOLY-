<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; transition: 0.3s; }
        .cell.owned { background: #ffdae0; border-color: #ff59aa; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; transition: transform 0.2s; margin: 10px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
        #modal { display: none; position: fixed; top: 30%; left: 40%; width: 300px; background: #fff0f9; border: 3px solid #ff80bf; padding: 20px; border-radius: 15px; text-align: center; z-index: 100; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="modal">
    <h3 id="modal-title">¡Evento!</h3>
    <p id="modal-text"></p>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Aceptar</button>
</div>

<img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
<img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <div id="dice-val">-</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR CASILLA</button>
            <div style="font-size: 14px; margin-top:10px;">💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <input type="text" id="peer-id" class="input-field" placeholder="ID amigo">
            <button class="btn" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 10px; margin-top: 5px;">Generando...</div>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, amigoPos = 0, miDinero = 1000, bloqueado = false, soyHost = false, enviadaACarcel = false;
    
    const mapa = [
        {n: "SALIDA", p:0}, {n: "TÉ ($100)", p:100, owner:null, renta: 20}, 
        {n: "SUERTE", p:0}, {n: "BOUTIQUE ($200)", p:200, owner:null, renta: 40}, 
        {n: "¡A LA CÁRCEL!", p:0}, {n: "CAFÉ ($150)", p:150, owner:null, renta: 30}, 
        {n: "PARQUE ($120)", p:120, owner:null, renta: 25}, {n: "SPA ($250)", p:250, owner:null, renta: 50}, 
        {n: "VILLA 1 ($300)", p:300, owner:null, renta: 60}, {n: "MALL ($350)", p:350, owner:null, renta: 70}, 
        {n: "JOYAS ($400)", p:400, owner:null, renta: 80}, {n: "POLICÍA", p:0}, 
        {n: "VILLA 3 ($220)", p:220, owner:null, renta: 45}, {n: "GYM ($180)", p:180, owner:null, renta: 35}, 
        {n: "COMUNIDAD", p:0}, {n: "VIVIENDA ($500)", p:500, owner:null, renta: 100}
    ];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    function moverFichas() {
        ['p1', 'p2'].forEach((id) => {
            let pos = (id === 'p1') ? miPos : amigoPos;
            const cell = document.getElementById('cell-' + pos);
            const rect = cell.getBoundingClientRect();
            const el = document.getElementById(id);
            el.style.left = (rect.left + (id === 'p1' ? 5 : 40)) + 'px';
            el.style.top = (rect.top + 5) + 'px';
        });
    }

    function tirarDado() {
        if(!miTurno || bloqueado) return;
        let val = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-val').innerText = "Dado: " + val;
        let prevPos = miPos;
        miPos = (miPos + val) % mapa.length;
        if(miPos < prevPos) { miDinero += 100; log("Pasaste por SALIDA: +$100"); }
        
        let casilla = mapa[miPos];
        let proximoBloqueado = false;
        
        if (casilla.owner && casilla.owner !== 'yo') {
            miDinero -= casilla.renta;
            if(conn) conn.send({type: 'RENT', amount: casilla.renta});
        } else if (casilla.n === "¡A LA CÁRCEL!") {
            miPos = 11; // Redirige a la casilla de policía abajo
            enviadaACarcel = true;
            proximoBloqueado = true;
            log("¡A LA CÁRCEL! Turno perdido.");
        } else if (casilla.n === "POLICÍA" && enviadaACarcel) {
            proximoBloqueado = true;
            log("En la cárcel: turno perdido.");
        }
        
        document.getElementById('dinero-mio').innerText = miDinero;
        moverFichas();
        
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
        if(conn) conn.send({type: 'MOVE', pos: miPos, lock: proximoBloqueado, carcel: enviadaACarcel});
    }

    function comprar() {
        let actual = mapa[miPos];
        if (actual.p > 0 && actual.owner === null && miDinero >= actual.p) {
            miDinero -= actual.p;
            actual.owner = 'yo';
            document.getElementById('cell-' + miPos).classList.add('owned');
            document.getElementById('dinero-mio').innerText = miDinero;
            if(conn) conn.send({type: 'BUY', pos: miPos});
        }
    }

    function setupConn() {
        conn.on('data', d => {
            if(d.type === 'MOVE') {
                amigoPos = d.pos;
                enviadaACarcel = d.carcel;
                moverFichas();
                if(d.lock && bloqueado) { miTurno = soyHost; } else { miTurno = true; }
                document.getElementById('turno-text').innerText = "¡TU TURNO!";
            }
            if(d.type === 'BUY') { mapa[d.pos].owner = 'amigo'; document.getElementById('cell-' + d.pos).classList.add('owned'); }
            if(d.type === 'RENT') { miDinero += d.amount; document.getElementById('dinero-mio').innerText = miDinero; }
        });
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerText = m.n;
        board.appendChild(d);
    });

    peer.on('open', id => document.getElementById('my-id').innerText = "ID: " + id);
    peer.on('connection', c => { conn = c; setupConn(); miTurno = false; soyHost = true; document.getElementById('turno-text').innerText = "ESPERANDO..."; });
    function conectar() { conn = peer.connect(document.getElementById('peer-id').value); setupConn(); miTurno = true; soyHost = false; document.getElementById('turno-text').innerText = "¡TU TURNO!"; }
    setTimeout(moverFichas, 500);

</html>
