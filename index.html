<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; }
        #cell-0 { grid-column: 1; grid-row: 1; } #cell-1 { grid-column: 2; grid-row: 1; } #cell-2 { grid-column: 3; grid-row: 1; } #cell-3 { grid-column: 4; grid-row: 1; } #cell-4 { grid-column: 5; grid-row: 1; }
        #cell-5 { grid-column: 5; grid-row: 2; } #cell-6 { grid-column: 5; grid-row: 3; } #cell-7 { grid-column: 5; grid-row: 4; } #cell-8 { grid-column: 5; grid-row: 5; }
        #cell-9 { grid-column: 4; grid-row: 5; } #cell-10 { grid-column: 3; grid-row: 5; } #cell-11 { grid-column: 2; grid-row: 5; } #cell-12 { grid-column: 1; grid-row: 5; }
        #cell-13 { grid-column: 1; grid-row: 4; } #cell-14 { grid-column: 1; grid-row: 3; } #cell-15 { grid-column: 1; grid-row: 2; }
    </style>
</head>
<body>

<div class="board" id="board">
    <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
    <div class="center-zone">
        <div id="turno-text">Bienvenido</div>
        <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
        <div>💖 $<span id="dinero-mio">1000</span></div>
    </div>
</div>

<div id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-extra"></div>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"IMPUESTOS",p:0},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];
    let miIdx = 0, sala = "partida1"; 

    function verificarCasilla(pos) {
        let p = mapa[pos];
        if (p.p === 0) return;
        db.ref('salas/'+sala+'/propiedades/'+pos).once('value', snap => {
            let prop = snap.val();
            document.getElementById('modal-title').innerText = p.n;
            let div = document.getElementById('modal-extra'); div.innerHTML = "";
            
            if (!prop) {
                div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar por $${p.p}</button>`;
            } else if (prop.owner === miIdx) {
                if (prop.nivel < 5) div.innerHTML = `<button class="btn" onclick="mejorar(${pos})">Mejorar (+$${p.p + 50})</button>`;
                else div.innerHTML = "Hotel completado";
            } else {
                let tasas = [0.10, 0.15, 0.20, 0.25, 0.30, 0.40];
                div.innerText = "Alquiler a pagar: $" + (p.p * tasas[prop.nivel]);
            }
            document.getElementById('modal').style.display = 'block';
        });
    }

    function comprar(pos) {
        db.ref('salas/'+sala+'/propiedades/'+pos).set({owner: miIdx, nivel: 0});
        document.getElementById('modal').style.display = 'none';
    }

    function mejorar(pos) {
        db.ref('salas/'+sala+'/propiedades/'+pos+'/nivel').transaction(n => (n || 0) + 1);
        document.getElementById('modal').style.display = 'none';
    }

    function tirarDado() {
        let val = Math.floor(Math.random()*6)+1;
        db.ref('salas/'+sala+'/jugador/pos').transaction(p => (p + val) % mapa.length, (err, comm, snap) => {
            verificarCasilla(snap.val());
        });
    }

    mapa.forEach((m, i) => { 
        const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-'+i;
        d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        d.onclick = () => verificarCasilla(i);
        document.getElementById('board').appendChild(d);
    });
</script>
</body>
</html>
