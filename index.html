<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; text-align: center; z-index: 999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" style="width:60px; cursor:pointer" onclick="tirarDado()">
            <div id="acciones"></div>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre de la sala">
            <button class="btn" onclick="unirse()">Entrar a Juego</button>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<div id="modal">
    <p id="modal-text" style="color:#c71585; font-weight:bold"></p>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Aceptar</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1, sala = "";
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const colores = ["#ffccd5", "#dcd0ff", "#c1e1c1", "#fff9c4"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"A LA CÁRCEL",p:0},{n:"CHEONGDAM",p:500},{n:"GANGNAM",p:520},{n:"SEOCHO-GU",p:250},{n:"MAPO",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"CÁRCEL",p:0},{n:"VILLA 3",p:220},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function log(txt) { document.getElementById('log').innerHTML += `<div>${txt}</div>`; }

    function unirse() {
        sala = document.getElementById('sala-id').value;
        const refJugadores = db.ref('salas/' + sala + '/jugadores');
        refJugadores.once('value', snap => {
            miIdx = snap.numChildren();
            if(miIdx > 3) return;
            // Inicializar jugador
            refJugadores.child(miIdx).set({ pos: 0, dinero: 1000, activo: true });
            if(miIdx == 0) db.ref('salas/' + sala + '/turno').set(0);
            log(nombres[miIdx] + " entró a la sala.");
            sincronizar();
        });
    }

    function tirarDado() {
        if(miIdx === -1) return;
        db.ref('salas/' + sala).once('value', snap => {
            if(snap.val().turno !== miIdx) return;
            let j = snap.val().jugadores[miIdx];
            let val = Math.floor(Math.random()*6)+1;
            let pos = (j.pos + val) % mapa.length;
            if(pos === 4) { pos = 11; log("¡" + nombres[miIdx] + " fue a la cárcel!"); }
            if(pos < j.pos) j.dinero += 100;
            db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: pos, dinero: j.dinero });
            verificarCasilla(pos, j.dinero);
            let numJugadores = snap.val().jugadores.length;
            db.ref('salas/' + sala + '/turno').set((snap.val().turno + 1) % numJugadores);
        });
    }

    function verificarCasilla(pos, dinero) {
        let div = document.getElementById('acciones'); div.innerHTML = "";
        let tipo = mapa[pos].n;
        if(tipo === "?" || tipo === "ARCA") {
            let m = Math.floor(Math.random()*200)+50;
            let g = Math.random() > 0.5;
            db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').set(dinero + (g ? m : -m));
            document.getElementById('modal-text').innerText = (g ? "Ganaste " : "Perdiste ") + "$" + m;
            document.getElementById('modal').style.display = 'block';
            log((g ? "Ganó $" : "Perdió $") + m + " en " + tipo);
        } else {
            db.ref('salas/' + sala + '/propiedades/' + pos).once('value', s => {
                if(!s.exists() && mapa[pos].p > 0) div.innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar $${mapa[pos].p}</button>`;
                else if(s.exists()) {
                    if(s.val().owner == miIdx && s.val().nivel < 3) div.innerHTML = `<button class="btn" onclick="mejorar(${pos})">Mejorar $50</button>`;
                    else if(s.val().owner != miIdx) {
                        let rent = Math.floor(mapa[pos].p * (s.val().nivel === 1 ? 0.1 : s.val().nivel === 2 ? 0.15 : 0.25));
                        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - rent);
                        db.ref('salas/' + sala + '/jugadores/' + s.val().owner + '/dinero').transaction(d => d + rent);
                        log("Alquiler: " + nombres[miIdx] + " pagó $" + rent + " a " + nombres[s.val().owner]);
                    }
                }
            });
        }
    }

    function comprar(pos) {
        db.ref('salas/' + sala + '/propiedades/' + pos).set({ owner: miIdx, nivel: 1 });
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - mapa[pos].p);
        log(nombres[miIdx] + " compró " + mapa[pos].n);
    }

    function mejorar(pos) {
        db.ref('salas/' + sala + '/propiedades/' + pos + '/nivel').transaction(n => (n || 1) + 1);
        db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => d - 50);
        log(nombres[miIdx] + " mejoró su propiedad.");
    }

    function sincronizar() {
        db.ref('salas/' + sala).on('value', snap => {
            let s = snap.val();
            if(!s || !s.jugadores) return;
            document.getElementById('dinero-mio').innerText = s.jugadores[miIdx].dinero;
            document.getElementById('turno-text').innerText = (s.turno == miIdx) ? "¡ES TU TURNO!" : "Esperando a " + (nombres[s.turno] || "Jugador");
            
            s.jugadores.forEach((j, i) => {
                let el = document.getElementById('p' + i);
                if(el) {
                    el.style.display = 'block';
                    let cell = document.getElementById('cell-' + j.pos);
                    if(cell) { el.style.left = (cell.offsetLeft + 15 + (i*8)) + 'px'; el.style.top = (cell.offsetTop + 15) + 'px'; }
                }
            });
            if(s.propiedades) {
                Object.keys(s.propiedades).forEach(p => {
                    let cell = document.getElementById('cell-'+p);
                    if(cell) cell.style.backgroundColor = colores[s.propiedades[p].owner];
                });
            }
        });
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
