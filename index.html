<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .input-field { width: 93%; padding: 8px; margin: 5px 0; border: 1px solid #ffccd5; border-radius: 8px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; }
        #log { height: 200px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; }
        .chat-box { width: 950px; margin-top: 20px; background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        #chat-messages { height: 100px; overflow-y: auto; background: white; border: 1px solid #ffccd5; padding: 10px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">
        <img src="https://i.imgur.com/u2AtssG.png" id="p3" class="token">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p4" class="token">
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <button class="btn" onclick="mejorar()">MEJORAR (+)</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <strong>Conexión</strong>
            <input type="text" id="peer-id" class="input-field" placeholder="ID del Host">
            <button class="btn" onclick="conectar()">Conectar</button>
            <div id="my-id">Iniciando...</div>
        </div>
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<div class="chat-box">
    <strong>Chat</strong>
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" class="input-field">
    <button class="btn" onclick="enviarMensaje()">Enviar</button>
</div>

<script>
    const peer = new Peer();
    let conn, esHost = false;
    let peerConnections = [];
    let miIndex = 0;
    let turnoActual = 0; 
    let miPos = [0,0,0,0];
    let jugadores = ["Dog", "Caballo", "Hat", "Car"];

    const mapa = [
        {n: "SALIDA", p:0}, {n: "IGLESIA", p:100}, {n: "?", p:0}, {n: "BOUTIQUE", p:200}, 
        {n: "¡A LA CÁRCEL!", p:0}, {n: "CHEONGDAM", p:500}, {n: "GANGNAM", p:520}, {n: "SEOCHO-GU", p:250}, 
        {n: "MAPO", p:300}, {n: "INCHEON", p:350}, {n: "JOYAS", p:400}, {n: "CÁRCEL", p:0}, 
        {n: "VILLA 3", p:220}, {n: "?", p:0}, {n: "ARCA", p:0}, {n: "BUKCHON", p:500}
    ];

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function mostrarChat(user, msg) { document.getElementById('chat-messages').innerHTML += `<div><b>${user}:</b> ${msg}</div>`; }
    function actualizarUI() { document.getElementById('turno-text').innerText = "Turno de: " + jugadores[turnoActual]; }

    function tirarDado() {
        if (turnoActual !== miIndex) return log("No es tu turno.");
        let val = Math.floor(Math.random()*6)+1;
        miPos[miIndex] = (miPos[miIndex] + val) % 16;
        if (miPos[miIndex] === 4) miPos[miIndex] = 11;
        let data = {type: 'MOVE', idx: miIndex, pos: miPos[miIndex], next: (miIndex + 1) % 4};
        procesarMovimiento(data);
        if (esHost) peerConnections.forEach(c => c.send(data));
        else conn.send(data);
    }

    function procesarMovimiento(d) {
        miPos[d.idx] = d.pos;
        turnoActual = d.next;
        const el = document.getElementById('p' + (d.idx + 1));
        const cell = document.getElementById('cell-' + d.pos);
        if(cell && el) { el.style.left = (cell.offsetLeft + 10) + 'px'; el.style.top = (cell.offsetTop + 10) + 'px'; }
        log(jugadores[d.idx] + " se movió a " + mapa[d.pos].n);
        actualizarUI();
    }

    peer.on('open', id => {
        document.getElementById('my-id').innerText = "ID: " + id;
        if (id) log("Dog (el host) creó la sala.");
    });

    peer.on('connection', c => {
        esHost = true;
        peerConnections.push(c);
        let nuevoIdx = peerConnections.length;
        let nombreInvitado = jugadores[nuevoIdx];
        
        c.send({type: 'INIT', idx: nuevoIdx});
        log(nombreInvitado + " se ha unido a la sala exitosamente.");
        
        c.on('data', d => {
            if (d.type === 'MOVE' || d.type === 'CHAT') {
                if (d.type === 'MOVE') procesarMovimiento(d);
                else mostrarChat(d.user, d.msg);
                peerConnections.forEach(con => con.send(d));
            }
        });
    });

    function conectar() {
        esHost = false; 
        conn = peer.connect(document.getElementById('peer-id').value);
        conn.on('open', () => log("Te has unido a la sala exitosamente."));
        conn.on('data', d => {
            if (d.type === 'INIT') {
                miIndex = d.idx;
            }
            if (d.type === 'MOVE') procesarMovimiento(d);
            if (d.type === 'CHAT') mostrarChat(d.user, d.msg);
        });
    }

    function enviarMensaje() {
        let msg = document.getElementById('chat-input').value;
        let user = jugadores[miIndex];
        let data = {type: 'CHAT', user: user, msg: msg};
        mostrarChat(user, msg);
        if (esHost) peerConnections.forEach(c => c.send(data));
        else if (conn) conn.send(data);
        document.getElementById('chat-input').value = "";
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
    
    function comprar() { if(turnoActual === miIndex) log("Compraste " + mapa[miPos[miIndex]].n); }
    function mejorar() { if(turnoActual === miIndex) log("Mejoraste propiedad."); }
</script>
</body>
</html>
