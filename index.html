<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; transition: 0.3s; }
        .token { width: 35px; height: 35px; position: absolute; transition: all 0.5s ease; z-index: 10; pointer-events: none; border-radius: 50%; }
        #p1 { border: 2px solid #555; } /* Perro */
        #p2 { border: 2px solid #fff; } /* Caballo */
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { width: 70%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<img src="https://i.imgur.com/FGnMi8Y.png" id="p1" class="token">
<img src="https://i.imgur.com/fRZJfP8.png" id="p2" class="token">

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text">ESPERANDO...</div>
            <div class="dice" onclick="tirarDado()" style="font-size: 40px; cursor: pointer;">🎲</div>
            <button class="btn" onclick="comprar()">COMPRAR</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel"><strong>ID:</strong> <span id="my-id"></span></div>
        <div class="panel"><strong>Historial</strong><div id="log" style="height: 150px; overflow:auto;"></div></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, amigoPos = 0;
    
    function moverFicha(id, pos) {
        const cell = document.getElementById('cell-' + pos);
        const rect = cell.getBoundingClientRect();
        const t = document.getElementById(id);
        // Si están en la misma casilla, p2 se desplaza a la derecha
        const offset = (id === 'p2' && miPos === amigoPos) ? 40 : 0;
        t.style.left = (rect.left + 5 + offset) + 'px';
        t.style.top = (rect.top + 5) + 'px';
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; }

    function tirarDado() {
        if(!miTurno) return;
        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % 18; // 18 casillas
        moverFicha('p1', miPos);
        conn.send({type: 'MOVE', pos: miPos});
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
    }

    peer.on('connection', c => { 
        conn = c; 
        log("Conectado");
        miTurno = true; // El host empieza
        document.getElementById('turno-text').innerText = "¡ES TU TURNO!";
        conn.send({type: 'START', turno: false});
    });

    function conectar() {
        conn = peer.connect(document.getElementById('peer-id').value);
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
    }

    // Configurar Setup
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    
    // Generar tablero
    const board = document.getElementById('board');
    for(let i=0; i<18; i++) {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerText = i;
        board.appendChild(d);
    }

    // Listener de datos
    // En el setup recibido:
    // conn.on('data', d => { if(d.type === 'MOVE') { amigoPos = d.pos; moverFicha('p2', amigoPos); miTurno = true; } });
</script>
</body>
</html>
