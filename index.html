<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .btn { width: 70%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 11px; }
        
        #log { height: 180px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
        #log::-webkit-scrollbar { width: 8px; } #log::-webkit-scrollbar-track { background: #ffccd5; border-radius: 10px; } #log::-webkit-scrollbar-thumb { background: #c71585; border-radius: 10px; }
        
        /* Modal estilo Windows Rosa */
        #modal { display: none; position: fixed; top: 30%; left: 40%; width: 300px; background: #fff0f9; border: 3px solid #ff80bf; padding: 20px; border-radius: 15px; text-align: center; z-index: 100; box-shadow: 10px 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="modal">
    <h3 id="modal-text" style="color: #c71585;">¡Tarjetita de Suerte!</h3>
    <button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
</div>

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="margin-bottom: 5px; font-size: 10px; font-weight: bold;">ESPERANDO...</div>
            <div onclick="tirarDado()" style="font-size: 40px; cursor: pointer;">🎲</div>
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <div class="banco-display" style="font-size: 12px; font-weight: bold; color: #c71585; margin-top: 10px; background: white; padding: 8px; border-radius: 10px; border: 1px solid #ffccd5; width: 100%; text-align: center;">
                💖 Tú: $<span id="dinero-mio">1000</span><br>
                💎 Amigo: $<span id="dinero-amigo">1000</span>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>ID de Conexión</strong>
            <input type="text" id="peer-id" placeholder="ID amigo" style="width:100%; margin: 10px 0; padding: 8px; border: 1px solid #ffccd5; border-radius: 8px;">
            <button class="btn" style="width:100%" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 10px; margin-top: 5px;">Generando ID...</div>
        </div>
        <div class="panel">
            <strong>Historial</strong>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, miDinero = 1000, amigoDinero = 1000, bloqueado = false;
    const mapa = [
        {n: "SALIDA", p:0}, {n: "TÉ ($100)", p:100}, {n: "SUERTE", p:0}, {n: "BOUTIQUE ($200)", p:200}, {n: "POLICÍA", p:0}, 
        {n: "CAFÉ ($150)", p:150}, {n: "PARQUE ($120)", p:120}, {n: "TÉ ($100)", p:100}, {n: "SPA ($250)", p:250}, {n: "VILLA 1 ($300)", p:300},
        {n: "MALL ($350)", p:350}, {n: "JOYAS ($400)", p:400}, {n: "VILLA 2 ($200)", p:200}, {n: "POLICÍA", p:0}, {n: "VILLA 3 ($220)", p:220},
        {n: "GYM ($180)", p:180}, {n: "PRÉSTAMO", p:-200}, {n: "VIVIENDA", p:500}
    ];

    function log(m, esRemoto = false) { 
        const l = document.getElementById('log'); 
        l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight;
        if(conn && !esRemoto) conn.send({type: 'LOG', msg: m});
    }

    function activarSuerte() {
        const premios = [50, 50, 100, 100, 150, 200];
        const premio = premios[Math.floor(Math.random() * premios.length)];
        miDinero += premio;
        document.getElementById('dinero-mio').innerText = miDinero;
        document.getElementById('modal-text').innerText = "¡Ganaste $" + premio + "!";
        document.getElementById('modal').style.display = 'block';
        log("¡Suerte! Ganaste $" + premio);
        if(conn) conn.send({type: 'MONEY_UPDATE', amount: miDinero});
    }

    function cambiarTurno(estado) {
        miTurno = estado;
        document.getElementById('turno-text').innerText = miTurno ? "¡ES TU TURNO!" : "ESPERANDO...";
        log(miTurno ? "¡Te toca lanzar!" : "Le toca a tu amorcito.");
    }

    function comprar() {
        let actual = mapa[miPos];
        if (actual.n === "SUERTE") { activarSuerte(); return; }
        if (actual.n === "PRÉSTAMO") { miDinero += 200; log("¡Pediste préstamo!"); }
        else if (actual.n === "VIVIENDA" && miDinero >= 500) { miDinero -= 500; log("¡Construiste casa!"); }
        else if (actual.p > 0 && miDinero >= actual.p) { miDinero -= actual.p; log("Compraste " + actual.n); }
        else return;
        document.getElementById('dinero-mio').innerText = miDinero;
        if(conn) conn.send({type: 'MONEY_UPDATE', amount: miDinero});
    }

    peer.on('open', id => document.getElementById('my-id').innerText = "Tu ID: " + id);
    peer.on('connection', c => { conn = c; setup(); log("¡Conexión establecida!"); });

    function conectar() {
        conn = peer.connect(document.getElementById('peer-id').value);
        setup();
        cambiarTurno(true);
        log("¡Conexión establecida!");
    }

    function setup() {
        conn.on('data', d => {
            if(d.type === 'MOVE') {
                cambiarTurno(true);
                if(d.bloqueado) { bloqueado = true; log("¡Un turno sin jugar!"); }
            } else if(d.type === 'LOG') {
                log(d.msg, true);
            } else if(d.type === 'MONEY_UPDATE') {
                amigoDinero = d.amount;
                document.getElementById('dinero-amigo').innerText = amigoDinero;
            }
        });
    }

    function tirarDado() {
        if(!miTurno) return;
        if(bloqueado) { log("¡Turno perdido!"); bloqueado = false; cambiarTurno(false); return; }
        
        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % mapa.length;
        log("Sacaste " + val + ". Caíste en " + mapa[miPos].n);
        
        let b = (mapa[miPos].n === "POLICÍA");
        conn.send({type: 'MOVE', val: val, bloqueado: b});
        cambiarTurno(false);
    }

    const board = document.getElementById('board');
    mapa.forEach(m => {
        const d = document.createElement('div');
        d.className = 'cell'; d.innerText = m.n;
        board.appendChild(d);
    });
</script>
</body>
</html>
