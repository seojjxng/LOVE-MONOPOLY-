<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monopoly Naeun Town</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .main-wrapper { display: flex; gap: 20px; }
        .game-area { display: flex; flex-direction: column; gap: 10px; width: 550px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; }
        .token { width: 25px; height: 25px; position: absolute; z-index: 10; transition: all 0.5s ease; border-radius: 50%; border: 2px solid white; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bottom-controls { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #fff0f9; border-radius: 20px; border: 2px solid #ffccd5; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: #fff0f9; padding: 15px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { padding: 8px 15px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .input-field { width: 90%; padding: 8px; margin-bottom: 5px; border: 1px solid #ffccd5; border-radius: 8px; }
        #log, #chat-log { height: 100px; overflow-y: auto; font-size: 10px; background: white; padding: 5px; border: 1px solid #ffccd5; margin-bottom: 5px; }
        #modal { display: none; position: fixed; top: 20%; left: 35%; width: 300px; background: #ffe4e9; padding: 20px; border: 3px solid #ff80bf; border-radius: 15px; z-index: 999; }
        #dado-display { font-size: 40px; font-weight: bold; color: #ff59aa; margin: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="game-area">
        <div class="board" id="board">
            <div class="center-zone">
                <div id="turno-text" style="font-size: 12px;">Esperando sala...</div>
                <div id="dado-display">0</div>
                <button class="btn" onclick="tirarDado()">🎲 Tirar</button>
                <div style="margin-top:5px">💖 $<span id="dinero-mio">1000</span></div>
            </div>
            <div id="tokens-container"></div>
        </div>
        <div class="bottom-controls">
            <button class="btn" onclick="abrirBanco()">🏦 Banco</button>
            <button class="btn" onclick="verSaldos()">💰 Saldos</button>
        </div>
        <div id="acciones"></div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>Unirse a Sala</strong>
            <input type="text" id="sala-id" class="input-field" placeholder="Nombre sala">
            <button class="btn" style="width:100%" onclick="unirse()">Entrar</button>
        </div>
        <div class="panel">
            <strong>Historial</strong><div id="log"></div>
            <strong>Chat</strong><div id="chat-log"></div>
            <input type="text" id="chat-msg" class="input-field" placeholder="Mensaje...">
            <button class="btn" style="width:100%" onclick="enviarChat()">Enviar</button>
        </div>
    </div>
</div>

<div id="modal"><h3 id="modal-title"></h3><div id="modal-content"></div><button class="btn" onclick="document.getElementById('modal').style.display='none'">Cerrar</button></div>

<script>
    const firebaseConfig = { databaseURL: "https://monopolovely-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let miIdx = -1, sala = "";
    const nombres = ["Dog", "Horse", "Hat", "Car"];
    const mapa = [{n:"SALIDA",p:0},{n:"IGLESIA",p:100},{n:"?",p:0},{n:"BOUTIQUE",p:200},{n:"CÁRCEL",p:0},{n:"SEOUL",p:500},{n:"GANGNAM",p:520},{n:"JEJU",p:250},{n:"BUSAN",p:300},{n:"INCHEON",p:350},{n:"JOYAS",p:400},{n:"PARKING",p:0},{n:"IMPUESTOS",p:150},{n:"?",p:0},{n:"ARCA",p:0},{n:"BUKCHON",p:500}];

    function unirse() {
        sala = document.getElementById('sala-id').value;
        db.ref('salas/'+sala+'/jugadores').once('value', s => {
            miIdx = s.numChildren();
            db.ref('salas/'+sala+'/jugadores/'+miIdx).set({pos:0, dinero:1000, deuda:0});
            sincronizar();
        });
    }

    function tirarDado() {
        let val = Math.floor(Math.random()*6)+1;
        document.getElementById('dado-display').innerText = val;
        db.ref('salas/'+sala+'/jugadores/'+miIdx).once('value', s => {
            let pos = (s.val().pos + val) % mapa.length;
            db.ref('salas/'+sala+'/jugadores/'+miIdx+'/pos').set(pos);
            db.ref('salas/'+sala+'/log').push(nombres[miIdx] + " tiró " + val);
            if(mapa[pos].p > 0) document.getElementById('acciones').innerHTML = `<button class="btn" onclick="comprar(${pos})">Comprar ${mapa[pos].n} $${mapa[pos].p}</button>`;
        });
    }

    function comprar(pos) {
        db.ref('salas/'+sala+'/propiedades/'+pos).set({owner: miIdx});
        document.getElementById('acciones').innerHTML = "¡Propiedad tuya!";
    }

    function abrirBanco() {
        document.getElementById('modal-title').innerText = "Préstamos";
        let c = document.getElementById('modal-content'); c.innerHTML = "";
        [200, 500, 1000].forEach(m => {
            let b = document.createElement('button'); b.className = 'btn'; b.style.display="block"; b.style.width="100%"; b.innerText = "$"+m;
            b.onclick = () => { db.ref('salas/'+sala+'/jugadores/'+miIdx).transaction(j => { j.dinero+=m; j.deuda+=m; return j; }); document.getElementById('modal').style.display='none'; };
            c.appendChild(b);
        });
        document.getElementById('modal').style.display = 'block';
    }

    function enviarChat() {
        let m = document.getElementById('chat-msg').value;
        db.ref('salas/'+sala+'/chat').push({n: nombres[miIdx], m: m, t: new Date().toLocaleTimeString()});
    }

    function verSaldos() {
        db.ref('salas/'+sala+'/jugadores').once('value', s => {
            let c = document.getElementById('modal-content'); c.innerHTML = "";
            s.forEach(child => { c.innerHTML += `<div>${nombres[child.key]}: $${child.val().dinero}</div>`; });
            document.getElementById('modal').style.display = 'block';
        });
    }

    // Dibujar tablero y tokens
    mapa.forEach((m, i) => { const d = document.createElement('div'); d.className = 'cell'; d.id = 'cell-'+i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`; document.getElementById('board').appendChild(d); });
    nombres.forEach((n, i) => { const t = document.createElement('div'); t.className = 'token'; t.id = 'token-'+i; t.style.background = ["#ff59aa", "#87CEFA", "#90EE90", "#FFD700"][i]; document.getElementById('tokens-container').appendChild(t); });

    function sincronizar() {
        db.ref('salas/'+sala).on('value', s => {
            let d = s.val(); if(!d) return;
            d.jugadores.forEach((j, i) => { 
                let c = document.getElementById('cell-'+j.pos); 
                let t = document.getElementById('token-'+i);
                t.style.left = (c.offsetLeft + 5) + 'px'; t.style.top = (c.offsetTop + 5) + 'px';
            });
            if(d.chat) { let h = ""; Object.values(d.chat).forEach(c => h += `<div>[${c.t}] ${c.n}: ${c.m}</div>`); document.getElementById('chat-log').innerHTML = h; }
            if(d.log) { let h = ""; Object.values(d.log).forEach(l => h += `<div>${l}</div>`); document.getElementById('log').innerHTML = h; }
        });
    }
</script>
</body>
</html>
