<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; color: #c71585; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; position: relative; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #c71585; text-align: center; cursor: pointer; }
        .owned-0 { background-color: #add8e6 !important; }
        .owned-1 { background-color: #ffb6c1 !important; }
        .owned-2 { background-color: #d8bfd8 !important; }
        .owned-3 { background-color: #f0e68c !important; }
        .token { width: 35px; height: 35px; position: absolute; z-index: 10; transition: all 0.5s ease; pointer-events: none; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #fff0f9; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; }
        .btn { width: 100%; padding: 10px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 12px; }
        .dice-img { width: 60px; height: 60px; cursor: pointer; margin: 10px; }
        #log { height: 300px; overflow-y: auto; font-size: 11px; color: #c71585; padding: 10px; background: white; border-radius: 10px; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <img src="https://i.imgur.com/FGnMi8Y.png" id="p0" class="token" style="display:none">
        <img src="https://i.imgur.com/fRZJfP8.png" id="p1" class="token" style="display:none">
        <img src="https://i.imgur.com/u2AtssG.png" id="p2" class="token" style="display:none">
        <img src="https://i.imgur.com/ekQp8WL.png" id="p3" class="token" style="display:none">
        
        <div class="center-zone">
            <div id="turno-text" style="font-weight:bold;">ESPERANDO...</div>
            <img src="https://i.imgur.com/Nsafzb4.png" class="dice-img" onclick="tirarDado()">
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <button class="btn" onclick="mejorar()" style="background:#ff80bf;">MEJORAR (+)</button>
            <div>💖 $<span id="dinero-mio">1000</span></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel"><strong>Historial</strong><div id="log"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://monopolovely-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let miIdx = -1;
    let miPos = 0;
    let miDinero = 1000;
    const mapa = [
        {n: "SALIDA", p:0}, {n: "IGLESIA", p:100}, {n: "?", p:0}, {n: "BOUTIQUE", p:200}, 
        {n: "CÁRCEL", p:0}, {n: "CHEONGDAM", p:500}, {n: "GANGNAM", p:520}, {n: "SEOCHO-GU", p:250}, 
        {n: "MAPO", p:300}, {n: "INCHEON", p:350}, {n: "JOYAS", p:400}, {n: "CÁRCEL", p:0}, 
        {n: "VILLA 3", p:220}, {n: "?", p:0}, {n: "ARCA", p:0}, {n: "BUKCHON", p:500}
    ];

    // Registro inicial en Firebase
    db.ref('jugadores').once('value').then(snap => {
        miIdx = snap.numChildren();
        if(miIdx < 4) {
            db.ref('jugadores/' + miIdx).set({ pos: 0, dinero: 1000 });
            document.getElementById('p' + miIdx).style.display = 'block';
            document.getElementById('turno-text').innerText = "Jugador " + (miIdx + 1);
        }
    });

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    function tirarDado() {
        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % mapa.length;
        db.ref('jugadores/' + miIdx).update({ pos: miPos });
        log("Sacaste " + val);
    }

    function comprar() {
        db.ref('propiedades/' + miPos).once('value').then(snap => {
            if(!snap.exists() && miDinero >= mapa[miPos].p && mapa[miPos].p > 0) {
                miDinero -= mapa[miPos].p;
                db.ref('propiedades/' + miPos).set({ owner: miIdx });
                document.getElementById('dinero-mio').innerText = miDinero;
            }
        });
    }

    // Sincronización de tablero
    db.ref('jugadores').on('value', snap => {
        snap.forEach((child) => {
            let idx = child.key;
            let data = child.val();
            let el = document.getElementById('p' + idx);
            let cell = document.getElementById('cell-' + data.pos);
            if(cell && el) { el.style.left = (cell.offsetLeft + 30) + 'px'; el.style.top = (cell.offsetTop + 30) + 'px'; }
        });
    });

    db.ref('propiedades').on('child_added', snap => {
        document.getElementById('cell-' + snap.key).classList.add('owned-' + snap.val().owner);
    });

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.id = 'cell-' + i; d.innerHTML = `${m.n}<br>${m.p > 0 ? '$'+m.p : ''}`;
        board.appendChild(d);
    });
</script>
</body>
</html>
