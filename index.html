<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Town P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { display: flex; gap: 25px; width: 950px; }
        .board { display: grid; grid-template-columns: repeat(5, 100px); grid-template-rows: repeat(5, 100px); gap: 8px; background: #ffccd5; padding: 15px; border-radius: 25px; }
        .cell { background: white; border: 2px solid #ffccd5; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #ff59aa; text-align: center; }
        .center-zone { grid-column: 2 / 5; grid-row: 2 / 5; background: #fff5f7; border: 3px dashed #ff80bf; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 20px; border: 2px solid #ffccd5; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 70%; padding: 8px; background: #ff59aa; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 11px; }
        #log { height: 180px; overflow-y: auto; font-size: 11px; color: #555; padding-top: 10px; }
        .banco-display { font-size: 12px; font-weight: bold; color: #ff59aa; margin-top: 10px; background: #fff; padding: 8px; border-radius: 5px; border: 1px solid #ffccd5; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="board" id="board">
        <div class="center-zone">
            <div id="turno-text" style="margin-bottom: 5px; font-size: 10px;">ESPERANDO...</div>
            <div onclick="tirarDado()" style="font-size: 40px; cursor: pointer;">🎲</div>
            <button class="btn" onclick="comprar()">COMPRAR</button>
            <div class="banco-display">
                💖 Tú: $<span id="dinero-mio">1000</span><br>
                💎 Amigo: $<span id="dinero-amigo">1000</span>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <strong>ID de Conexión</strong>
            <input type="text" id="peer-id" placeholder="ID amigo" style="width:100%; margin: 10px 0; padding: 8px;">
            <button class="btn" style="width:100%" onclick="conectar()">Conectar</button>
            <div id="my-id" style="font-size: 10px;">Generando ID...</div>
        </div>
        <div class="panel">
            <strong>Historial</strong>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let conn, miTurno = false, miPos = 0, miDinero = 1000, amigoDinero = 1000, bloqueado = false;
    const mapa = [
        {n: "SALIDA", p:0}, {n: "TÉ", p:100}, {n: "SUERTE", p:0}, {n: "BOUTIQUE", p:200}, {n: "POLICÍA", p:0}, 
        {n: "CAFÉ", p:150}, {n: "PARQUE", p:120}, {n: "TÉ", p:100}, {n: "SPA", p:250}, {n: "VILLA 1", p:300},
        {n: "MALL", p:350}, {n: "JOYAS", p:400}, {n: "VILLA 2", p:200}, {n: "POLICÍA", p:0}, {n: "VILLA 3", p:220},
        {n: "GYM", p:180}, {n: "VILLA 4", p:250}, {n: "SUERTE", p:0}
    ];

    function log(m) { 
        const l = document.getElementById('log'); 
        l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight;
        if(conn) conn.send({type: 'LOG', msg: m});
    }

    function syncMoney() {
        if(conn) conn.send({type: 'MONEY_UPDATE', amount: miDinero});
    }

    function comprar() {
        let precio = mapa[miPos].p;
        if(precio > 0 && miDinero >= precio) {
            miDinero -= precio;
            document.getElementById('dinero-mio').innerText = miDinero;
            syncMoney();
            log("Compraste " + mapa[miPos].n);
        } else log("No puedes comprar esto.");
    }

    peer.on('open', id => document.getElementById('my-id').innerText = "Tu ID: " + id);
    peer.on('connection', c => { conn = c; setup(); log("¡Conexión establecida!"); });

    function conectar() {
        conn = peer.connect(document.getElementById('peer-id').value);
        setup();
        miTurno = true;
        document.getElementById('turno-text').innerText = "TU TURNO";
        log("¡Conexión establecida!");
    }

    function setup() {
        conn.on('data', d => {
            if(d.type === 'MOVE') {
                miTurno = true;
                document.getElementById('turno-text').innerText = "TU TURNO";
                if(d.bloqueado) { bloqueado = true; log("¡Un turno sin jugar para ti!"); }
            } else if(d.type === 'LOG') { log("Amigo: " + d.msg);
            } else if(d.type === 'MONEY_UPDATE') {
                amigoDinero = d.amount;
                document.getElementById('dinero-amigo').innerText = amigoDinero;
            }
        });
    }

    function tirarDado() {
        if(!miTurno) return;
        if(bloqueado) {
            log("¡Turno perdido!");
            bloqueado = false; miTurno = false;
            conn.send({type: 'MOVE', val: 0, bloqueado: false});
            return;
        }

        let val = Math.floor(Math.random()*6)+1;
        miPos = (miPos + val) % mapa.length;
        log("Sacaste " + val + ". Caíste en " + mapa[miPos].n);
        
        let bloqueadoNext = false;
        if(mapa[miPos].n === "POLICÍA") {
            log("¡Un turno sin jugar para tu amorcito!");
            bloqueadoNext = true;
        }

        conn.send({type: 'MOVE', val: val, bloqueado: bloqueadoNext});
        miTurno = false;
        document.getElementById('turno-text').innerText = "ESPERANDO...";
    }

    const board = document.getElementById('board');
    mapa.forEach((m, i) => {
        const d = document.createElement('div');
        d.className = 'cell'; d.innerText = m.n;
        board.appendChild(d);
    });
</script>
</body>
</html>
