<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cute Monopoly Adventure</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #fff0f3; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .arcade-container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 20px; border: 4px solid #ffb3d9; }
        .board-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 20px; }
        .b-cell { background: #fffafb; border: 2px solid #ffccd5; padding: 10px; text-align: center; }
        .id-display { background: #ffe6f2; padding: 10px; font-weight: bold; color: #ff0084; }
    </style>
</head>
<body>

<div class="arcade-container">
    <h3>CUTE MONOPOLY P2P</h3>
    
    <!-- Sección Host -->
    <div id="host-zone">
        <p>Tu ID de Host:</p>
        <div class="id-display" id="my-peer-id">Esperando...</div>
    </div>

    <!-- Sección Invitado -->
    <div style="margin-top:20px;">
        <input type="text" id="rival-peer-id" placeholder="ID del Host aquí">
        <button onclick="conectar()">💎 Conectar como Invitado</button>
    </div>

    <div id="event-log" style="margin-top:10px; font-weight:bold;">Estado: Iniciando...</div>
    <div class="board-grid" id="board-mesh"></div>
</div>

<script>
    // LÓGICA: Solo asignamos ID fijo si es el primer jugador.
    // Para simplificar, dejaremos que PeerJS asigne IDs aleatorios a ambos.
    // Es la forma más segura de que no se rompa el código.
    const peer = new Peer(); 
    let conn;

    peer.on('open', (id) => {
        document.getElementById('my-peer-id').innerText = id;
        document.getElementById('event-log').innerText = "✅ Listo. Comparte este ID.";
        buildBoard();
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function conectar() {
        const peerID = document.getElementById('rival-peer-id').value;
        if (!peerID) return;
        conn = peer.connect(peerID);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('event-log').innerText = "💎 ¡CONEXIÓN ESTABLECIDA!";
        });
        conn.on('data', (data) => { alert("Recibido: " + data); });
    }

    function buildBoard() {
        const boardMesh = document.getElementById('board-mesh');
        for(let i=0; i<16; i++) {
            const div = document.createElement('div');
            div.className = 'b-cell';
            div.innerText = `Villa ${i + 1}`;
            boardMesh.appendChild(div);
        }
    }
</script>
</body>
</html>
