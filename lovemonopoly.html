       // 1. FUNCIÓN OBTENER GRUPO (CORREGIDA Y ÚNICA)
// 1. Obtención de grupo (Optimizado)
window.obtenerGrupo = function(pos) {
    // Si 'grupos' no existe o es nulo, retornamos null preventivamente
    if (typeof window.grupos === 'undefined' || !window.grupos) return null;
    
    // .find() es correcto, pero aseguramos que el grupo tenga índices válidos
    return window.grupos.find(g => Array.isArray(g.indices) && g.indices.includes(pos)) || null;
};

        // Función para generar las celdas dinámicamente
window.renderizarTablero = function() {
    const board = document.getElementById('board');
    if (!board) return;
    
    board.innerHTML = ""; // Limpiamos antes de dibujar

    window.mapa.forEach((celda, i) => {
        const d = document.createElement('div');
        d.className = 'cell';
        d.id = 'cell-' + i;

        // Accedemos a los datos con seguridad
        const grupo = (typeof obtenerGrupo === 'function') ? obtenerGrupo(i) : null;
        
        // Dibujamos el contenido
        d.innerHTML = `<div class="contenido">${celda.n}<br>$${celda.p > 0 ? celda.p : ''}</div>`;
        
        if (grupo) {
            d.style.borderTop = `10px solid ${grupo.color}`;
        }
        
        board.appendChild(d);
    });
};

// 2. Color por equipo (Escalable)
window.getColorEquipo = function(equipo) {
    // Usamos un objeto de mapeo para evitar múltiples 'if'
    // Esto es mucho más limpio y fácil de mantener si decides añadir más equipos
    const colores = {
        "A": "#4a90e2", // Azul
        "B": "#e74c3c", // Rojo
        "C": "#2ecc71", // Verde (Ejemplo de escalabilidad)
        "default": "#cccccc"
    };
    
    return colores[equipo] || colores["default"];
};

// 3. VERIFICAR MONOPOLIO (CORREGIDA PARA FIREBASE)
window.verificarMonopolioEquipo = function(pos, equipoId, data) {
    // 1. Validación de existencia de datos
    if (!data || !data.propiedades) return false;
    
    const grupo = window.obtenerGrupo(pos);
    if (!grupo || !grupo.indices) return false;

    const propiedades = data.propiedades;
    let contador = 0;

    // 2. Verificación de propiedad y estado (no hipotecado)
    for (const idx of grupo.indices) {
        const propiedad = propiedades[idx];
        
        // El monopolio se invalida si:
        // - La propiedad no existe.
        // - El dueño es diferente.
        // - La propiedad está hipotecada (hipotecada = true).
        if (propiedad && propiedad.owner === equipoId && !propiedad.hipotecada) {
            contador++;
        } else {
            // Si una sola falla, el monopolio no existe
            return false;
        }
    }
    
    // 3. Si el contador coincide, es monopolio
    return contador === grupo.indices.length;
};

    window.iniciarRelojClima = function() {
    // 1. Solo el "Host" (o el primer jugador) debe controlar el clima
    // Esto evita que todos los jugadores intenten cambiarlo al mismo tiempo
    if (window.miIdx !== 0) return;

    // 2. Intervalo seguro (usamos una variable para poder limpiarlo si fuera necesario)
    window.intervaloClima = setInterval(() => {
        if (typeof window.sala === 'undefined' || !window.climas) return;

        const nuevoClimaIdx = Math.floor(Math.random() * window.climas.length);
        const nuevoClima = window.climas[nuevoClimaIdx];

        // 3. Escritura única en Firebase
        window.db.ref('salas/' + window.sala + '/clima').set(nuevoClimaIdx)
            .then(() => {
                window.log("¡El clima ha cambiado a " + nuevoClima.n + "!");
            })
            .catch(err => console.error("Error al actualizar clima:", err));
            
    }, 600000); // 10 minutos
};

// 3. Función principal de unión (con reconexión)
window.procederConUnion = function(nombreSala) {
    // 1. Guardia de seguridad: evita múltiples ejecuciones
    if (typeof window.yaEntro !== 'undefined' && window.yaEntro) return;
    
    window.sala = nombreSala;
    let btn = document.getElementById('btn-unirse');
    if (btn) {
        btn.disabled = true;
        btn.innerText = "Conectando...";
    }

    db.ref('salas/' + sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val() || [];
        // Normalizamos el array para evitar huecos si la BD tiene índices saltados
        let listaJugadores = Array.isArray(jugadores) ? jugadores : Object.values(jugadores);
        
        let miNombreGuardado = localStorage.getItem('monopoly_nombre') || "Jugador " + (listaJugadores.length + 1);
        
        let indexEncontrado = listaJugadores.findIndex(j => j && j.nombre === miNombreGuardado);
        let encontrado = indexEncontrado !== -1;

        window.miIdx = encontrado ? indexEncontrado : listaJugadores.length;
        localStorage.setItem('monopoly_nombre', miNombreGuardado);
        
        // 2. Preparación de datos de unión
        let jugadorData = {
            nombre: miNombreGuardado,
            pos: (encontrado && listaJugadores[window.miIdx]) ? listaJugadores[window.miIdx].pos : 0,
            conectado: true, // Marcador de sesión activa
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        };
        
        // 3. Unión atómica
        db.ref('salas/' + sala + '/jugadores/' + window.miIdx).update(jugadorData)
        .then(() => {
            window.yaEntro = true;
            if (typeof window.sincronizar === 'function') {
                window.sincronizar();
            }
            console.log("Unido correctamente como:", miNombreGuardado);
        })
        .catch(error => {
            console.error("Error al unirse:", error);
            if (btn) btn.disabled = false; // Reactivamos si falla
        });
    });
};

window.calcularAlquiler = function(precioBase, duenoIdx) {
    // 1. Obtención segura del objeto dueño
    const jugadorDueño = (window.jugadores && window.jugadores[duenoIdx]) ? window.jugadores[duenoIdx] : null;
    
    // 2. Cálculo de reputación con valores por defecto seguros
    const rep = (jugadorDueño && typeof jugadorDueño.reputacion === 'number') ? jugadorDueño.reputacion : 50;
    
    let multiplicador = 1.0; 
    if (rep >= 90) multiplicador = 1.10;      // Bonus: +10%
    else if (rep <= 30) multiplicador = 0.85; // Rumores: -15%

    const precioAjustado = precioBase * multiplicador;

    // 3. Verificación de bonos de aliado
    const bonoAliado = (typeof obtenerBonosReputacion === 'function') ? obtenerBonosReputacion(window.miIdx) : 1.0;
    
    // 4. Retorno final redondeado
    return Math.floor(precioAjustado * bonoAliado);
};

    if (!todasLasPropiedades || typeof dueñoIdx === 'undefined') return 0;
    
    const indicesTransporte = [8, 24, 26, 27];

    // 2. Conteo de ferrocarriles poseídos

        if (prop && prop.owner === dueñoIdx) {
            cantidad++;
        }

    // 3. Tabla de alquileres (Escalabilidad protegida)
    const tabla = { 1: 100, 2: 150, 3: 250, 4: 300 };
    
    // Retornamos el valor basado en la cantidad, si es 0, devuelve 0
    return tabla[cantidad] || 0;
};

        let totalCasas = Object.values(propiedades)
            .filter(p => p.owner === jugadorIdx)
            .reduce((sum, p) => sum + (p.nivel || 0), 0);

        if (totalCasas >= 5) {
            let refMision = db.ref('salas/' + sala + '/jugadores/' + jugadorIdx + '/misionesCumplidas/renovador');
            refMision.once('value', snap => {
                if (!snap.val()) {
                    refMision.set(true);
                    db.ref('salas/' + sala + '/jugadores/' + jugadorIdx + '/dinero').transaction(d => (d || 0) + 500);
                    db.ref('salas/' + sala + '/jugadores/' + jugadorIdx + '/ultimaMision').set("renovador");
                    if (typeof log === 'function') log((window.nombres ? nombres[jugadorIdx] : "Jugador") + " completó la misión: Renovador.");

            });
        }
    });
};

        window.verificarLogros = function(idx) {
    // 1. Verificación básica de seguridad
    if (typeof window.jugadores === 'undefined' || !window.jugadores[idx]) return;

    let jugador = window.jugadores[idx];
    // Aseguramos que reputacion tenga un valor numérico por defecto
    let rep = jugador.reputacion || 0; 
    let cambios = {}; 

    // 2. Lógica para Magnate de la Reputación
    if (rep >= 100 && !jugador.escudo) {
        cambios.escudo = true;
        alert("¡FELICIDADES! Has alcanzado 100 de reputación. ¡Has ganado un ESCUDO DE LUJO!");
    }

    // 3. Lógica para Hotel en Ruinas
    if (rep <= 0 && (jugador.quiebraTecnica || 0) === 0) {
        cambios.quiebraTecnica = 2; // El jugador no cobra por 2 turnos
        alert("¡ADVERTENCIA! Reputación en 0. Entras en QUIEBRA TÉCNICA por 2 turnos.");
    }

    // 4. Envío a Firebase solo si hay cambios reales
    if (Object.keys(cambios).length > 0) {
        let jugadorRef = db.ref('salas/' + sala + '/jugadores/' + idx);
        jugadorRef.update(cambios)
            .catch(error => console.error("Error al actualizar logros:", error));
    }
};
        window.pedirPrestamo = function(monto) {
    if (typeof sala === 'undefined' || typeof miIdx === 'undefined') return;

    db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value', snap => {
        let j = snap.val();
        if (!j) return;

        // 1. Validación de seguridad
        if (j.tienePrestamo) {
            document.getElementById('modal-title').innerText = "⚠️ Error";
            document.getElementById('modal-text').innerHTML = 
                `<p>No puedes solicitar un nuevo préstamo mientras tengas una deuda activa de <b>$${j.montoPrestamo || 0}</b>.</p>
                 <p>Debes liquidar tu deuda actual primero.</p>`;
            document.getElementById('modal-extra').innerHTML = 
                `<button class="btn" onclick="abrirBanco()">Volver al Banco</button>`;
            return;
        }

        // 2. Transacción segura
        db.ref('salas/' + sala + '/jugadores/' + miIdx).transaction(player => {
            if (player && !player.tienePrestamo) {
                player.tienePrestamo = true;
                player.montoPrestamo = monto;
                // Forzamos la suma como número para evitar errores de concatenación de texto
                player.dinero = (Number(player.dinero) || 0) + monto;
                return player;
            }
            return; // Aborta si ya tiene préstamo
        }, (error, committed) => {
            if (committed) {
                // Registro de acción
                if (typeof log === 'function') {
                    let nombre = (typeof nombres !== 'undefined') ? nombres[miIdx] : "Jugador";
                    log(nombre + " obtuvo un préstamo de $" + monto + ".");
                }
                if (typeof cerrarModal === 'function') cerrarModal();
            } else if (error) {
                console.error("Error en la transacción del préstamo:", error);
            }
        });
    });
};

  window.proponerVenta = function(pIdx) {
    let sel = document.getElementById('sel-' + pIdx);
    let input = document.getElementById('precio-' + pIdx);
    
    if (!sel || !input) return;

    let comprador = parseInt(sel.value);
    let precio = parseInt(input.value);

    // 1. Validación de comprador
    if (isNaN(comprador)) {
        alert("Error: Debes seleccionar un comprador válido.");
        return;
    }

    // 2. Validación de rango (Llamamos a tu función de aviso centralizada)
    if (isNaN(precio) || precio < 100 || precio > 999) {
        window.mostrarAvisoIntercambio();
        return;
    }

    // 3. Confirmación antes de enviar a Firebase
    if (confirm(`¿Quieres proponer la venta de la propiedad ${pIdx} por $${precio}?`)) {
        
        // Estructura de la oferta en Firebase
        let oferta = {
            propiedad: parseInt(pIdx),
            vendedor: parseInt(window.miIdx),
            comprador: comprador,
            precio: precio,
            estado: 'pendiente',
            timestamp: Date.now()
        };

        // Guardamos en la sala bajo 'ofertas'
        db.ref('salas/' + window.sala + '/ofertas').push(oferta)
            .then(() => {
                // Registro en log
                let nombreProp = (typeof mapa !== 'undefined' && mapa[pIdx]) ? mapa[pIdx].n : "propiedad";
                let nombreComp = (typeof nombres !== 'undefined') ? nombres[comprador] : "Jugador " + (comprador + 1);
                
                if (typeof log === 'function') {
                    log(nombres[miIdx] + " propuso vender " + nombreProp + " a " + nombreComp + " por $" + precio);
                }
                
                if (typeof cerrarModal === 'function') cerrarModal();
            })
            .catch(error => {
                console.error("Error al enviar oferta:", error);
                alert("No se pudo enviar la oferta. Revisa tu conexión.");
            });
    }
};

window.confirmarCompra = function(ofertaKey) {
    if (typeof sala === 'undefined' || !sala) return;

    db.ref('salas/' + sala + '/ofertas/' + ofertaKey).once('value', snap => {
        let o = snap.val();
        if (!o) {
            alert("Esta oferta ya no existe.");
            return;
        }

        // Normalizamos los índices y el precio
        let pIdx = parseInt(o.prop);
        let compradorIdx = parseInt(o.para);
        let vendedorIdx = parseInt(o.de);
        let precio = parseInt(o.precio);

        db.ref('salas/' + sala).transaction(data => {
            // Verificación de existencia de datos
            if (!data || !data.jugadores || !data.jugadores[compradorIdx] || !data.jugadores[vendedorIdx]) return;

            let dineroComprador = Number(data.jugadores[compradorIdx].dinero) || 0;

            // Validación de fondos
            if (dineroComprador < precio) {
                console.warn("Fondos insuficientes");
                return; // Se aborta la transacción
            }

            // Transferencia de dinero
            data.jugadores[compradorIdx].dinero = dineroComprador - precio;
            data.jugadores[vendedorIdx].dinero = (Number(data.jugadores[vendedorIdx].dinero) || 0) + precio;

            // Actualización de propiedad
            if (!data.propiedades) data.propiedades = {};
            data.propiedades[pIdx] = { owner: compradorIdx };

            return data; // Firebase guarda los cambios
        }, (error, committed, snapshot) => {
            if (error) {
                console.error("Error en la transacción:", error);
                alert("Hubo un error al procesar la compra.");
            } else if (committed) {
                // Borramos la oferta tras el éxito
                db.ref('salas/' + sala + '/ofertas/' + ofertaKey).remove();
                
                let modal = document.getElementById('modal');
                if (modal) modal.style.display = 'none';
                
                if (typeof log === 'function') log("¡Venta completada!");
            } else {
                // committed es false si la transacción fue abortada (fondos insuficientes)
                alert("¡No tienes suficiente dinero para esta compra!");
            }
        });
    });
};

// Función corregida para mostrar la oferta

window.abrirIntercambio = function() {
    // 1. Limpieza inicial segura
    let modalExtra = document.getElementById('modal-extra');
    let modalText = document.getElementById('modal-text');
    let modalTitle = document.getElementById('modal-title');
    let modal = document.getElementById('modal');

    if (!modal || !modalExtra || !modalText || !modalTitle) return;

    modalExtra.innerHTML = "";
    
    db.ref('salas/' + sala).once('value', snap => {
        let data = snap.val();
        if (!data) return;

        let misProps = [];
        // 2. Extracción segura
        if (data.propiedades) {
            Object.keys(data.propiedades).forEach(pIdx => {
                if (data.propiedades[pIdx] && data.propiedades[pIdx].owner === miIdx) {
                    misProps.push(pIdx);
                }
            });
        }
        
        // 3. Caso: No tiene propiedades
        if (misProps.length === 0) {
            modalTitle.innerText = "¡Atención!";
            modalText.innerHTML = '<div class="card-property"><p style="text-align: center; padding: 10px;">No tienes propiedades disponibles para vender.</p></div>';
            modalExtra.innerHTML = '<button class="btn" onclick="document.getElementById(\'modal\').style.display=\'none\'">Cerrar</button>';
            modal.style.display = 'block';
            return;
        }
        
        // 4. Construir formulario de venta
        modalTitle.innerText = "Revender Propiedad";
        let html = '<div class="card-property">Selecciona propiedad, precio (100-999) y comprador:<br><br>';
        
        misProps.forEach(pIdx => {
            let p = (typeof mapa !== 'undefined') ? mapa[pIdx] : { n: "Propiedad " + pIdx };
            html += `<b>${p.n}</b>:<br>
                     <input type="number" id="precio-${pIdx}" min="100" max="999" value="250" style="width: 80px;"> 
                     <select id="sel-${pIdx}">`;
            
            // Validación: Verificar jugadores
            if (data.jugadores && Array.isArray(data.jugadores)) {
                data.jugadores.forEach((j, i) => { 
                    if (i !== miIdx) {
                        let nombreJugador = (typeof nombres !== 'undefined' && nombres[i]) ? nombres[i] : "Jugador " + (i + 1);
                        html += `<option value="${i}">${nombreJugador}</option>`; 
                    }
                });
            }
            
            html += `</select> <button class="btn" onclick="proponerVenta(${pIdx})">Vender</button><br><br>`;
        });
        
        html += '</div>';
        modalText.innerHTML = html;
        modalExtra.innerHTML = '<button class="btn" onclick="document.getElementById(\'modal\').style.display=\'none\'">Cerrar</button>';
        modal.style.display = 'block';
    });
};

window.hipotecar = function(pos) {
    if (typeof sala === 'undefined' || !mapa[pos]) return;
    
    db.ref('salas/' + sala + '/propiedades/' + pos).update({ hipotecada: true });
    db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) + Math.floor(mapa[pos].p / 2));
    
    if (typeof log === 'function') log(nombres[miIdx] + " hipotecó " + mapa[pos].n);
    if (document.getElementById('modal')) document.getElementById('modal').style.display = 'none';
};

window.liberar = function(pos) {
    if (typeof sala === 'undefined' || !mapa[pos]) return;
    
    db.ref('salas/' + sala + '/propiedades/' + pos).update({ hipotecada: false });
    db.ref('salas/' + sala + '/jugadores/' + miIdx + '/dinero').transaction(d => (d || 0) - Math.floor(mapa[pos].p * 0.6));
    
    if (typeof log === 'function') log(nombres[miIdx] + " liberó " + mapa[pos].n);
    if (document.getElementById('modal')) document.getElementById('modal').style.display = 'none';
};

// --- MANEJO DE CASILLA (Optimizado) ---
window.manejarCasilla = function(pos) {
    if (typeof mapa === 'undefined' || !mapa[pos]) return;

    let p = mapa[pos];

    // ... (Casos 2 a 5: Cárcel, Eventos, Parada, Impuestos - Mantenlos igual)

    // 6. CASO FERROCARRILES (Corregido: usamos 'jugadores' de forma segura)
    let g = (typeof obtenerGrupo === 'function') ? obtenerGrupo(pos) : null;
    if (g && g.color === "#f5f5dc") {
        db.ref('salas/' + sala).once('value', snap => {
            let data = snap.val() || {};
            let prop = data.propiedades ? data.propiedades[pos] : null;
            
            if (!prop) {
                window.verPropiedad(pos, true);
            } else if (prop.owner !== miIdx) {
                // Protección contra lectura de 'jugadores' inexistentes
                let esAliado = (data.jugadores && data.jugadores[miIdx] && prop.equipo === data.jugadores[miIdx].equipo);
                
                if (esAliado) {
                    log("¡Es propiedad de tu aliado, estás a salvo!");
                } else {
                    let trans = [8, 24, 26, 27];
                    let count = trans.filter(i => data.propiedades && data.propiedades[i] && data.propiedades[i].owner === prop.owner).length;
                    let alquiler = { 1: 100, 2: 150, 3: 250, 4: 300 }[count] || 100;
                    
                    window.procesarPago(miIdx, prop.owner, alquiler);
                    log(nombres[miIdx] + " pagó $" + alquiler + " de transporte.");
                }
            } else {
                window.verPropiedad(pos, false);
            }
        });
        return;
    }

    // 7. CASO PROPIEDAD NORMAL
    db.ref('salas/' + sala + '/propiedades/' + pos).once('value', snap => {
        let prop = snap.val();
        // Lógica simplificada: si tiene dueño y no soy yo y no es mi aliado -> Pagar
        if (prop && prop.owner !== undefined && prop.owner !== miIdx) {
            let esAliado = (window.jugadores && window.jugadores[miIdx] && prop.equipo === window.jugadores[miIdx].equipo);
            if (esAliado) {
                log("¡Propiedad de tu aliado, a salvo!");
                return;
            }
        }
        window.verPropiedad(pos, (prop && prop.owner === undefined)); 
    });
};

        window.toggleModo2v2 = function() {
    if (typeof sala === 'undefined' || !sala) return;

    db.ref('salas/' + sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val();
        if (!jugadores) return;

        // Convertimos el objeto de jugadores a un array para iterar con índices seguros
        let keys = Object.keys(jugadores);
        
        if (keys.length !== 4) {
            alert("El modo 2v2 requiere exactamente 4 jugadores. Actualmente hay: " + keys.length);
            return;
        }

        // 1. Asignación dinámica (Más seguro que confiar en idx === "0")
        let actualizaciones = {};
        keys.forEach((idx, i) => {
            let equipoAsignado = (i < 2) ? "A" : "B";
            actualizaciones['jugadores/' + idx] = { 
                ...jugadores[idx], // Mantenemos todos los datos previos (nombre, dinero, etc.)
                equipo: equipoAsignado,
                reputacion: 50
            };
        });

        // 2. Configuración global
        actualizaciones['config'] = { 
            modo: '2v2',
            equipoA: [parseInt(keys[0]), parseInt(keys[1])],
            equipoB: [parseInt(keys[2]), parseInt(keys[3])]
        };
        
        actualizaciones['modo2v2'] = true;

        // 3. Ejecutamos todas las actualizaciones en una sola operación (Multi-path update)
        // Esto es mucho más rápido y evita que la interfaz parpadee
        db.ref('salas/' + sala).update(actualizaciones)
            .then(() => {
                if (typeof log === 'function') {
                    log("¡Modo 2v2 ACTIVADO! Equipos A y B formados.");
                }
            })
            .catch(error => console.error("Error al activar 2v2:", error));
    });
};
        
window.inicializarEquipos = function() {
    if (typeof sala === 'undefined' || !sala) return;

    db.ref('salas/' + sala + '/jugadores').once('value', snap => {
        let jugadores = snap.val();
        if (!jugadores) return;

        // Usamos Object.keys para obtener los IDs reales, así no dependemos de que sean "0, 1, 2, 3"
        let keys = Object.keys(jugadores);
        let actualizaciones = {};

        keys.forEach((idx, i) => {
            // Asignamos por orden de llegada: los dos primeros al A, los otros al B
            let equipoAsignado = (i < 2) ? "A" : "B";
            
            // Usamos la ruta completa para el update masivo
            actualizaciones[idx + '/equipo'] = equipoAsignado;
            actualizaciones[idx + '/reputacion'] = 50;
        });

        // Aplicamos todos los cambios a la vez en la referencia de 'jugadores'
        db.ref('salas/' + sala + '/jugadores').update(actualizaciones)
            .then(() => {
                if (typeof log === 'function') {
                    log("Equipos inicializados correctamente.");
                }
            })
            .catch(error => console.error("Error al inicializar equipos:", error));
    });
};

        window.pagarFianza = function() {

    window.pasarTurno = function() {
    // 1. Reseteamos contadores de dados locales
    if (typeof turnosSeis !== 'undefined') turnosSeis = 0;

    db.ref('salas/' + sala).once('value', snap => {
        let data = snap.val();
        let total = Object.keys(data.jugadores).length;
        let t = Number(data.turno);
        
        let nuevoTurno = (t + 1) % total;
        let intentos = 0;

        // 2. Lógica recursiva/bucle para saltar presos
        // Buscamos hasta encontrar a alguien libre o dar la vuelta completa
        while (data.jugadores[nuevoTurno].enCarcel > 0 && intentos < total) {
            log(nombres[nuevoTurno] + " está en la cárcel. Saltando turno...");
            
            // Reducimos condena
            db.ref('salas/' + sala + '/jugadores/' + nuevoTurno)
              .update({ enCarcel: data.jugadores[nuevoTurno].enCarcel - 1 });
            
            // Avanzamos al siguiente
            nuevoTurno = (nuevoTurno + 1) % total;
            intentos++;
        }

        // 3. Aplicamos el nuevo turno encontrado
        db.ref('salas/' + sala + '/turno').set(nuevoTurno);
        log("Es el turno de " + nombres[nuevoTurno]);
    });
};

        /**
 * Verifica si el jugador aún existe en la sala.
 * Si no existe, lo expulsa. Si existe, ejecuta la acción (callback).
 */
window.validarSesion = async function(callback) {
    // 1. Verificación básica de sesión
    if (typeof sala === 'undefined' || typeof miIdx === 'undefined') {
        alert("Sesión perdida. Redirigiendo...");
        window.location.href = "/login.html";
        return;
    }

    // 2. BLOQUEAR interfaz al iniciar para evitar Race Conditions
    window.bloquearBotones(true);

    try {
        const snap = await db.ref('salas/' + sala + '/jugadores/' + miIdx).once('value');
        
        if (!snap.exists()) {
            console.error("Jugador no encontrado en la sala. Expulsando...");
            alert("Has sido desconectado o expulsado de la sala.");
            window.location.href = "/login.html";
        } else {
            // 3. Ejecutamos la acción y esperamos a que termine (debe ser async/promise)
            await callback();
        }
    } catch (error) {
        console.error("Error al validar sesión:", error);
        alert("Error de conexión. Inténtalo de nuevo.");
    } finally {
        // 4. DESBLOQUEAR interfaz (se ejecuta pase lo que pase)
        window.bloquearBotones(false);
    }
};

window.mejorar = async function(pos) {
    if (typeof sala === 'undefined') return;

    // Retornamos una promesa para que validarSesion pueda hacer 'await'
    return new Promise((resolve) => {
        db.ref('salas/' + sala).once('value', snap => {
            let data = snap.val();
            if (!data || !data.propiedades || !data.propiedades[pos]) {
                resolve();
                return;
            }

            let prop = data.propiedades[pos];
            let miEquipo = (window.jugadores && window.jugadores[miIdx]) ? window.jugadores[miIdx].equipo : null;
            let nivelActual = prop.nivel || 0;

            // 1. Validación de monopolio
            window.mejorarPropiedad = function(pos, nivelActual, miEquipo, prop, data) {
    return new Promise((resolve) => {
        // 1. Verificación de condiciones
        let tieneMonopolio = typeof window.verificarMonopolioEquipo === 'function' 
            ? window.verificarMonopolioEquipo(pos, miEquipo, data) 
            : false;

        if (!tieneMonopolio) {
            alert("Necesitas tener el control total del grupo para mejorar.");
            resolve();
            return;
        }

        if (nivelActual >= 5) {
            alert("Ya está al nivel máximo.");
            resolve();
            return;
        }

        // 2. Transacción atómica en Firebase
        // Nota: Asegúrate de que 'window.sala' y 'window.miIdx' estén definidos globalmente
        window.db.ref('salas/' + window.sala + '/jugadores/' + window.miIdx + '/dinero').transaction(dinero => {
            if (dinero >= 50) {
                // Actualizar nivel en la propiedad
                window.db.ref('salas/' + window.sala + '/propiedades/' + pos).update({ nivel: nivelActual + 1 });
                
                // Registrar en el log
                if (typeof window.log === 'function') {
                    let nombreJugador = window.nombres[window.miIdx];
                    let nombrePropiedad = window.mapa[pos].n;
                    let accion = (prop.owner === window.miIdx) 
                        ? `${nombreJugador} mejoró ${nombrePropiedad} al nivel ${nivelActual + 1}`
                        : `${nombreJugador} invirtió en una propiedad del Equipo ${miEquipo}: ${nombrePropiedad} ahora es nivel ${nivelActual + 1}`;
                    window.log(accion);
                }
                
                if (typeof window.cerrarModal === 'function') window.cerrarModal();
                
                return dinero - 50; // Restar dinero si hay éxito
            } else {
                alert("No tienes suficiente dinero.");
                return; // Aborta la transacción
            }
        }, (error, committed, snapshot) => {
            // Se ejecuta al terminar la transacción
            if (error) {
                console.error("Error en la transacción:", error);
            }
            resolve();
        });
    });
};
             
    
    window.tirarDado = async function() {
    if (typeof miIdx === 'undefined' || miIdx === -1) return;

    // Bloqueamos la interfaz visualmente para evitar clicks dobles
    const btnDado = document.querySelector('img[alt="Lanzar dado"]');
    if (btnDado) btnDado.style.pointerEvents = 'none';

    return new Promise((resolve) => {
        db.ref('salas/' + sala).once('value', snap => {
            const s = snap.val();
            if (!s || s.turno !== miIdx) {
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
                return;
            }

            // --- GESTIÓN DE CÁRCEL ---
            if (s.jugadores[miIdx].enCarcel > 0) {
                log(nombres[miIdx] + " está en la cárcel.");
                window.pasarTurno();
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
                return;
            }

            // 1. Lógica de clima (Rotación)
            if (typeof window.climas !== 'undefined') {
                const nuevoClima = Math.floor(Math.random() * window.climas.length);
                db.ref('salas/' + sala + '/clima').set(nuevoClima);
            }

            // 2. Cálculo del dado
            const dado = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dado-valor').innerText = dado;

            const contadorActual = s.jugadores[miIdx].seisSeguidos || 0;
            const nuevoContador = (dado === 6) ? contadorActual + 1 : 0;

            // 3. Movimiento con validación
            const posActual = Number(s.jugadores[miIdx].pos);
            const nuevaPos = (posActual + dado) % window.mapa.length;

            if (nuevaPos < posActual) {
                db.ref('salas/'+sala+'/jugadores/'+miIdx+'/dinero').transaction(d => (d || 0) + 100);
                log(nombres[miIdx] + " pasó por SALIDA y cobró $100.");
            }

            // 4. Lógica de Fraude (3 veces 6)
            if (nuevoContador === 3) {
                log("¡ACUSACIÓN DE FRAUDE! " + nombres[miIdx] + " sacó tres 6 seguidos.");
                db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: 9, enCarcel: 2, seisSeguidos: 0 });
                window.pasarTurno();
            } else {
                db.ref('salas/' + sala + '/jugadores/' + miIdx).update({ pos: nuevaPos, seisSeguidos: nuevoContador });
                if (dado !== 6) window.pasarTurno();
                else log("¡Sacaste un 6! Tienes turno extra.");
            }

            // Animación y resolución
            setTimeout(() => {
                if (typeof window.manejarCasilla === 'function') window.manejarCasilla(nuevaPos);
                if (btnDado) btnDado.style.pointerEvents = 'auto';
                resolve();
            }, 800); // Aumenté a 800ms para asegurar que la UI alcance a actualizarse
        });
    });
};
